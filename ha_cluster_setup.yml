    - name: "WEB | index.php test sayfası oluştur"
      copy:
        dest: "{{ nginx_web_root | default(gfs2_mount + '/html') }}/index.php"
        content: |
          <?php
          // HA Cluster PHP Test Sayfası
          $cluster_name  = "{{ cluster_name }}";
          $virtual_ip    = "{{ virtual_ip }}";
          $web_root      = "{{ nginx_web_root | default(gfs2_mount + '/html') }}";
          $gfs2_mount    = "{{ gfs2_mount }}";
          $node_hostname = gethostname();
          $node_ip       = $_SERVER['SERVER_ADDR'] ?? '?';
          $php_version   = PHP_VERSION;
          $php_fpm_ok    = (php_sapi_name() === 'fpm-fcgi');

          // GFS2 erişim testi — web kök altında yaz (nginx kullanıcısının izni var)
          // NOT: $gfs2_mount kök dizinine değil $web_root/tmp/ altına yazılır.
          // nginx kullanıcısı /shared/webfs/html/ dizininde okuma/yazma yetkisine sahip.
          $test_dir   = $web_root . '/tmp';
          $test_file  = $test_dir . '/.ha_test_' . $node_hostname;
          if (!is_dir($test_dir)) @mkdir($test_dir, 0755, true);
          $gfs2_write = @file_put_contents($test_file, date('Y-m-d H:i:s') . ' ' . $node_hostname) !== false;
          if (file_exists($test_file)) @unlink($test_file);

          // PostgreSQL bağlantı testi — pg_connect (php-pgsql) veya PDO fallback
          $pgsql_ok  = false;
          $pgsql_msg = '';
          $pgsql_ext = '';

          if (function_exists('pg_connect')) {
              // php-pgsql native driver
              $pgsql_ext = 'pg_connect (php-pgsql)';
              $conn = @pg_connect("host={{ virtual_ip }} port={{ pgsql_port }} dbname=postgres user=postgres password={{ pgsql_password }} connect_timeout=3");
              if ($conn) {
                  $pgsql_ok  = true;
                  $ver = pg_version($conn);
                  $pgsql_msg = 'Bağlantı başarılı — PostgreSQL ' . ($ver['server'] ?? '?');
                  pg_close($conn);
              } else {
                  $pgsql_msg = 'Bağlantı başarısız — pg_hba.conf veya parola kontrol edin';
              }
          } elseif (class_exists('PDO') && in_array('pgsql', PDO::getAvailableDrivers())) {
              // PDO pgsql fallback
              $pgsql_ext = 'PDO::pgsql';
              try {
                  $dsn  = "pgsql:host={{ virtual_ip }};port={{ pgsql_port }};dbname=postgres;connect_timeout=3";
                  $pdo  = new PDO($dsn, 'postgres', '{{ pgsql_password }}');
                  $stmt = $pdo->query('SELECT version()');
                  $row  = $stmt->fetch(PDO::FETCH_NUM);
                  $pgsql_ok  = true;
                  $pgsql_msg = 'Bağlantı başarılı — ' . substr($row[0] ?? 'PostgreSQL', 0, 40);
              } catch (PDOException $e) {
                  $pgsql_msg = 'Bağlantı başarısız — ' . $e->getMessage();
              }
          } else {
              $pgsql_ext = 'yok';
              $pgsql_msg = 'php-pgsql veya PDO pgsql sürücüsü kurulu değil';
          }

          function status_badge($ok, $yes = 'OK', $no = 'HATA') {
              $color = $ok ? '#22c55e' : '#ef4444';
              $text  = $ok ? $yes : $no;
              return "<span style=\"background:$color;color:#fff;padding:3px 10px;border-radius:12px;font-size:0.75rem;font-weight:600;\">$text</span>";
          }
          ?>
          <!DOCTYPE html>
          <html lang="tr">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>HA Cluster - PHP Testi</title>
              <style>
                  * { box-sizing: border-box; margin: 0; padding: 0; }
                  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
                  .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 40px; max-width: 750px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
                  h1 { color: #a78bfa; font-size: 1.8rem; margin-bottom: 8px; }
                  .node-badge { display:inline-block; background:#0284c7; color:#fff; padding:4px 14px; border-radius:20px; font-size:0.75rem; font-weight:600; margin-bottom:24px; font-family:monospace; }
                  section { margin-bottom: 24px; }
                  h2 { color: #7c3aed; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; }
                  table { width: 100%; border-collapse: collapse; }
                  th { text-align: left; color: #94a3b8; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.08em; padding: 7px 10px; border-bottom: 1px solid #334155; }
                  td { padding: 9px 10px; border-bottom: 1px solid #1e293b; font-size: 0.88rem; }
                  td:first-child { color: #94a3b8; width: 42%; }
                  td.val { font-family: monospace; color: #e2e8f0; }
                  .footer { margin-top: 20px; padding-top: 14px; border-top: 1px solid #334155; font-size: 0.78rem; color: #475569; text-align: center; }
                  a { color: #38bdf8; text-decoration:none; }
              </style>
          </head>
          <body>
          <div class="card">
              <h1>⚡ PHP-FPM Test</h1>
              <span class="node-badge">Node: <?= htmlspecialchars($node_hostname) ?></span>

              <section>
                  <h2>Bu Node</h2>
                  <table>
                      <tr><th>Parametre</th><th>Değer</th></tr>
                      <tr><td>Hostname</td><td class="val"><?= htmlspecialchars($node_hostname) ?></td></tr>
                      <tr><td>Sunucu IP</td><td class="val"><?= htmlspecialchars($node_ip) ?></td></tr>
                      <tr><td>PHP Versiyonu</td><td class="val"><?= $php_version ?></td></tr>
                      <tr><td>PHP SAPI</td><td class="val"><?= php_sapi_name() ?> <?= status_badge($php_fpm_ok, 'FPM', 'Değil') ?></td></tr>
                  </table>
              </section>

              <section>
                  <h2>Cluster</h2>
                  <table>
                      <tr><th>Bileşen</th><th>Durum</th></tr>
                      <tr><td>Virtual IP</td><td class="val"><?= $virtual_ip ?></td></tr>
                      <tr><td>Cluster Adı</td><td class="val"><?= $cluster_name ?></td></tr>
                      <tr><td>GFS2 Yazma Testi</td><td><?= status_badge($gfs2_write, 'Başarılı', 'Başarısız') ?></td></tr>
                      <tr><td>PostgreSQL (VIP)</td><td><?= status_badge($pgsql_ok, 'Bağlandı', 'Bağlanamadı') ?> <small style="color:#64748b;font-size:0.8rem;"> <?= htmlspecialchars($pgsql_msg) ?> [<?= $pgsql_ext ?>]</small></td></tr>
                  </table>
              </section>

              <div class="footer">
                  Sunucu Zamanı: <?= date('Y-m-d H:i:s T') ?> &nbsp;|&nbsp; <a href="/index.html">← Ana Sayfa</a>
              </div>
          </div>
          </body>
          </html>
        owner: nginx
        group: nginx
        mode: '0644'
      run_once: true
      delegate_to: "{{ groups['cluster_nodes'][0] }}"

    - name: "RESULT | Test sayfaları oluşturuldu"
      debug:
        msg: |
          ✓ Test sayfaları hazır:
            {{ nginx_web_root | default(gfs2_mount + '/html') }}/index.html  (HTML test)
            {{ nginx_web_root | default(gfs2_mount + '/html') }}/index.php   (PHP-FPM test)
      run_once: true

    # ---- PHP-FPM Yapılandırması --------------------------------------------
    - name: "WEB | PHP-FPM www.conf - nginx kullanıcısına ayarla"
      block:
        - name: "PHP-FPM | /var/run/php-fpm dizini"
          file:
            path: /run/php-fpm
            state: directory
            owner: nginx
            group: nginx
            mode: '0755'

        - name: "PHP-FPM | www.conf - listen = socket"
          lineinfile:
            path: /etc/php-fpm.d/www.conf
            regexp: '^listen\s*='
            line: "listen = {{ php_fpm_socket | default('/run/php-fpm/www.sock') }}"
            backup: yes

        - name: "PHP-FPM | www.conf - listen.owner = nginx"
          lineinfile:
            path: /etc/php-fpm.d/www.conf
            regexp: '^;?listen\.owner\s*='
            line: "listen.owner = {{ php_fpm_pool_user | default('nginx') }}"

        - name: "PHP-FPM | www.conf - listen.group = nginx"
          lineinfile:
            path: /etc/php-fpm.d/www.conf
            regexp: '^;?listen\.group\s*='
            line: "listen.group = {{ php_fpm_pool_group | default('nginx') }}"

        - name: "PHP-FPM | www.conf - listen.mode = 0660"
          lineinfile:
            path: /etc/php-fpm.d/www.conf
            regexp: '^;?listen\.mode\s*='
            line: "listen.mode = 0660"

        - name: "PHP-FPM | www.conf - user = nginx"
          lineinfile:
            path: /etc/php-fpm.d/www.conf
            regexp: '^user\s*='
            line: "user = {{ php_fpm_pool_user | default('nginx') }}"

        - name: "PHP-FPM | www.conf - group = nginx"
          lineinfile:
            path: /etc/php-fpm.d/www.conf
            regexp: '^group\s*='
            line: "group = {{ php_fpm_pool_group | default('nginx') }}"

        - name: "RESULT | PHP-FPM yapılandırıldı"
          debug:
            msg: "✓ PHP-FPM www.conf → socket: {{ php_fpm_socket | default('/run/php-fpm/www.sock') }}, user/group: {{ php_fpm_pool_user | default('nginx') }}"
      rescue:
        - name: "ERROR | PHP-FPM yapılandırma hatası"
          debug:
            msg: "⚠ PHP-FPM yapılandırma hatası - /etc/php-fpm.d/www.conf kontrol edilmeli"

    # ---- Nginx Yapılandırması ----------------------------------------------
    - name: "WEB | Nginx yapılandırması"
      copy:
        dest: "{{ nginx_config_file | default('/etc/nginx/nginx.conf') }}"
        content: |
          # Ansible tarafından yönetilir — hosts.yml → nginx_* değişkenleri
          # HA Cluster Nginx Yapılandırması
          # Web kök: {{ nginx_web_root | default(gfs2_mount + '/html') }} (GFS2 paylaşımlı)
          user nginx;
          worker_processes auto;
          error_log /var/log/nginx/error.log warn;
          pid /run/nginx.pid;

          events {
              worker_connections 1024;
              use epoll;
              multi_accept on;
          }

          http {
              include       /etc/nginx/mime.types;
              default_type  application/octet-stream;

              log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                                '$status $body_bytes_sent "$http_referer" '
                                '"$http_user_agent" "$http_x_forwarded_for"';

              access_log  /var/log/nginx/access.log  main;

              sendfile        on;
              tcp_nopush      on;
              tcp_nodelay     on;
              keepalive_timeout 65;
              gzip on;
              gzip_types text/plain text/css application/json application/javascript text/xml;

              server {
                  listen {{ nginx_port | default(80) }};
                  server_name _;
                  root {{ nginx_web_root | default(gfs2_mount + '/html') }};
                  index index.php index.html;

                  # Cluster monitoring endpoint
                  location {{ nginx_status_path | default('/nginx_status') }} {
                      stub_status on;
                      access_log off;
                      allow 127.0.0.1;
                      allow {{ public_network }};
                      deny all;
                  }

                  location / {
                      try_files $uri $uri/ /index.html;
                  }

                  # PHP-FPM
                  location ~ \.php$ {
                      try_files $uri =404;
                      fastcgi_pass unix:{{ php_fpm_socket | default('/run/php-fpm/www.sock') }};
                      fastcgi_index index.php;
                      fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
                      include fastcgi_params;
                      fastcgi_read_timeout 60;
                      fastcgi_connect_timeout 10;
                  }

                  # Hata sayfaları
                  error_page 404              /404.html;
                  error_page 500 502 503 504  /50x.html;
                  location = /50x.html {
                      root /usr/share/nginx/html;
                  }
              }
          }
        owner: root
        group: root
        mode: '0644'
      register: nginx_conf_result

    - name: "WEB | Nginx yapılandırma sözdizimi doğrula"
      command: nginx -t
      register: nginx_syntax
      changed_when: false
      failed_when: nginx_syntax.rc != 0

    - name: "RESULT | Nginx yapılandırma doğrulandı"
      debug:
        msg: "✓ Nginx yapılandırması geçerli"

    # ---- Systemd Servislerini Devre Dışı Bırak (Cluster Yönetecek) -------
    # KÖK NEDEN: masked=yes → systemd DBus üzerinden start yapılamaz.
    # Pacemaker'ın systemd:php-fpm ve ocf:heartbeat:nginx resource agent'ları
    # systemd DBus API'sini kullanır. Masked servis → DBus "LoadError: Masked" →
    # "Unable to invoke systemd DBus method" hatası.
    #
    # DOĞRU YAKLAŞIM: Sadece stopped + enabled=no
    #   - Sistem boot'unda otomatik başlamaz (enabled=no) ✓
    #   - Pacemaker DBus üzerinden başlatabilir (masked değil) ✓
    #   - Pacemaker stop yaptığında systemd bunu kabul eder ✓
    #
    # NOT: nginx için OCF resource agent (ocf:heartbeat:nginx) kullanıldığından
    #      nginx servisini de sadece stop + disable yeterli.
    - name: "SERVICE | nginx ve php-fpm systemd servisleri durdurulup devre dışı bırakılıyor"
      systemd:
        name: "{{ item }}"
        state: stopped
        enabled: no
        masked: no
      loop:
        - nginx
        - php-fpm
      failed_when: false

    - name: "RESULT | nginx + php-fpm durduruldu — Cluster başlatacak"
      debug:
        msg: "✓ nginx + php-fpm: stopped + disabled (masked DEĞİL); Pacemaker nginx-clone ve php-fpm-clone olarak yönetecek"

    # ---- SELinux: GFS2 üzerinde nginx erişimine izin ver ------------------
    - name: "SELINUX | nginx → GFS2 ağ erişimi (selinux boolean)"
      command: "setsebool -P {{ item }} 1"
      loop:
        - httpd_can_network_connect
        - httpd_can_network_connect_db
        - httpd_use_nfs
      failed_when: false
      changed_when: true

    - name: "SELINUX | GFS2 mount dizini nginx context"
      command: "semanage fcontext -a -t httpd_sys_content_t '{{ nginx_web_root | default(gfs2_mount + '/html') }}(/.*)?'"
      failed_when: false
      changed_when: true

    - name: "SELINUX | restorecon web kök"
      command: "restorecon -Rv {{ nginx_web_root | default(gfs2_mount + '/html') }}"
      failed_when: false
      changed_when: false

- name: "PLAY 11b-c | Nginx + PHP-FPM Cluster Kaynakları"
  hosts: "{{ groups['cluster_nodes'][0] }}"
  gather_facts: no
  become: yes
  any_errors_fatal: true

  tasks:
    - name: "PREP | Cluster hazır bekle"
      command: pcs status
      register: cluster_ready_11b
      retries: 10
      delay: 5
      until: cluster_ready_11b.rc == 0
      changed_when: false

    # =========================================================================
    # GFS2 PROBE KAYNAĞI — GERÇEK I/O SAĞLIĞI MONİTÖRÜ
    # =========================================================================
    # SORUN: ocf:heartbeat:Filesystem monitörü GFS2 withdraw'u tespit edemez.
    #   Filesystem hâlâ /proc/mounts'ta "mounted" görünür ama I/O error verir.
    #   Sonuç: Pacemaker GFS2'nin çöktüğünü bilmez, manuel müdahale gerekir.
    #
    # ÇÖZÜM: gfs2_probe kaynağı her 30s'de gerçek yazma/okuma testi yapar.
    #   I/O başarısız → on-fail=fence → node reboot → iSCSI reconnect → temiz başlangıç
    #
    # Kaynak tipi: ocf:heartbeat:anything — probe script'i sarmalar
    # =========================================================================
    - name: "RESOURCE | GFS2 probe kaynağı (gerçek I/O sağlık testi)"
      block:
        - name: "CHECK | gfs2_probe mevcut mu"
          command: pcs resource config gfs2_probe
          register: gfs2_probe_check
          changed_when: false
          failed_when: false

        - name: "CREATE | gfs2_probe kaynağı"
          command: >
            pcs resource create gfs2_probe ocf:heartbeat:anything
            binfile=/usr/local/sbin/gfs2-probe.sh
            cmdline_options=""
            op monitor interval=30s timeout=45s on-fail=fence
            op start  timeout=30s on-fail=fence
            op stop   timeout=20s on-fail=fence
          when: gfs2_probe_check.rc != 0
          # OCF_RESKEY_mountpoint gfs2_probe'a environment ile geçilebilir ama
          # gfs2-probe.sh default /shared/webfs kullanır — hosts.yml gfs2_mount değeriyle
          # eşleşir.

        - name: "CLONE | gfs2_probe-clone (her iki node'da)"
          command: >
            pcs resource clone gfs2_probe
            interleave=true
          when: gfs2_probe_check.rc != 0
          register: probe_clone_result
          failed_when:
            - probe_clone_result.rc != 0
            - "'already' not in (probe_clone_result.stderr | default(''))"

        - name: "ORDER | gfs2_fs-clone → gfs2_probe-clone"
          command: >
            pcs constraint order start gfs2_fs-clone
            then gfs2_probe-clone
            id=order-gfs2fs-probe
          register: probe_order
          failed_when:
            - probe_order.rc != 0
            - "'already exists' not in (probe_order.stderr | default(''))"
          changed_when: probe_order.rc == 0

        - name: "RESULT | gfs2_probe hazır"
          debug:
            msg: |
              ✓ gfs2_probe-clone kaynağı {{ 'oluşturuldu' if gfs2_probe_check.rc != 0 else 'zaten mevcut' }}
              Her iki node'da gerçek GFS2 I/O testi yapılacak (30s interval)
              I/O başarısız → on-fail=fence → otomatik node reboot
      rescue:
        - name: "WARN | gfs2_probe oluşturulamadı"
          debug:
            msg: |
              ⚠ gfs2_probe kaynağı oluşturulamadı (ocf:heartbeat:anything mevcut değil olabilir)
              Manuel alternatif:
                /usr/local/sbin/gfs2-probe.sh  (script mevcut, manuel test yapılabilir)
              Hata: {{ ansible_failed_result.msg | default('bilinmiyor') }}

    # ---- PHP-FPM Cluster Kaynağı ------------------------------------------
    - name: "RESOURCE | PHP-FPM cluster kaynağı"
      block:
        - name: "CHECK | php-fpm resource mevcut mu"
          command: pcs resource config php-fpm
          register: phpfpm_res_check
          changed_when: false
          failed_when: false

        - name: "CREATE | php-fpm kaynağı"
          command: >
            pcs resource create php-fpm systemd:php-fpm
            op monitor interval={{ resource_monitor_interval }} timeout=30s on-fail=restart
            op start  timeout={{ resource_start_timeout }}  on-fail=restart
            op stop   timeout={{ resource_stop_timeout }}   on-fail=block
          when: phpfpm_res_check.rc != 0

        - name: "CLONE | php-fpm-clone (her iki node'da)"
          command: >
            pcs resource clone php-fpm
            interleave=true
          when: phpfpm_res_check.rc != 0
          register: phpfpm_clone_result
          failed_when:
            - phpfpm_clone_result.rc != 0
            - "'already' not in (phpfpm_clone_result.stderr | default(''))"

        - name: "RESULT | php-fpm-clone hazır"
          debug:
            msg: "✓ php-fpm-clone kaynağı {{ 'oluşturuldu' if phpfpm_res_check.rc != 0 else 'zaten mevcut' }}"
      rescue:
        - name: "ERROR | php-fpm resource hatası"
          debug:
            msg: "✗ php-fpm cluster kaynağı oluşturulamadı! Hata: {{ ansible_failed_result.msg | default('bilinmiyor') }}"
          failed_when: true

    # ---- Nginx Cluster Kaynağı --------------------------------------------
    - name: "RESOURCE | Nginx cluster kaynağı"
      block:
        - name: "CHECK | nginx resource mevcut mu"
          command: pcs resource config nginx
          register: nginx_res_check
          changed_when: false
          failed_when: false

        - name: "CREATE | nginx kaynağı"
          command: >
            pcs resource create nginx ocf:heartbeat:nginx
            httpd=/usr/sbin/nginx
            configfile="{{ nginx_config_file | default('/etc/nginx/nginx.conf') }}"
            status10url="{{ nginx_status_path | default('/nginx_status') }}"
            op monitor interval={{ resource_monitor_interval }} timeout=30s on-fail=restart
            op start  timeout={{ resource_start_timeout }}  on-fail=restart
            op stop   timeout={{ resource_stop_timeout }}   on-fail=block
          when: nginx_res_check.rc != 0
          # FIX: httpd=/usr/sbin/nginx zorunlu!
          # SORUN: ocf:heartbeat:nginx agent Pacemaker'ın kısıtlı PATH ortamında
          #        çalışır (/usr/sbin PATH'de olmayabilir). Binary bulunamazsa
          #        agent OCF_ERR_INSTALLED (5) → "not installed" döndürür.
          # ÇÖZÜM: Tam yol her zaman açıkça belirtilmeli.

        # Mevcut nginx kaynağında httpd parametresi eksikse güncelle (idempotent)
        - name: "UPDATE | nginx httpd binary yolu güncelle (httpd=/usr/sbin/nginx)"
          shell: >
            pcs resource config nginx 2>/dev/null | grep -q 'httpd=/usr/sbin/nginx' &&
            echo 'already_set' ||
            pcs resource update nginx httpd=/usr/sbin/nginx
          register: nginx_httpd_update
          changed_when: "'already_set' not in nginx_httpd_update.stdout"
          failed_when: false
          when: nginx_res_check.rc == 0

        - name: "INFO | nginx httpd parametresi"
          debug:
            msg: "{{ 'ℹ httpd=/usr/sbin/nginx zaten ayarlı' if 'already_set' in (nginx_httpd_update.stdout | default('')) else '✓ nginx httpd=/usr/sbin/nginx güncellendi' }}"
          when: nginx_res_check.rc == 0

        - name: "CLONE | nginx-clone (her iki node'da)"
          command: >
            pcs resource clone nginx
            interleave=true
          when: nginx_res_check.rc != 0
          register: nginx_clone_result
          failed_when:
            - nginx_clone_result.rc != 0
            - "'already' not in (nginx_clone_result.stderr | default(''))"

        - name: "RESULT | nginx-clone hazır"
          debug:
            msg: "✓ nginx-clone kaynağı {{ 'oluşturuldu' if nginx_res_check.rc != 0 else 'zaten mevcut' }} (httpd=/usr/sbin/nginx)"
      rescue:
        - name: "ERROR | nginx resource hatası"
          debug:
            msg: "✗ nginx cluster kaynağı oluşturulamadı! Hata: {{ ansible_failed_result.msg | default('bilinmiyor') }}"
          failed_when: true

    # ---- Web Servisi Kaynak Sıralama Kuralları ----------------------------
    # Tam sıralama (en son iki kaynak php-fpm ve nginx):
    #
    #   dlm-clone → lvmlockd-clone → gfs2_lv_activate-clone → gfs2_fs-clone
    #                              ↘
    #                                pgsql_lv_activate → pgsql_fs → postgresql
    #                                                                     ↓
    #                                                             php-fpm-clone
    #                                                                     ↓
    #                                                             nginx-clone
    #
    # ÖNEMLI: Bu constraint'ler resource var/yok durumundan BAĞIMSIZ her zaman
    # çalışır. 'already exists' → idempotent olarak atlanır.
    - name: "CONSTRAINT | Web servisi kaynak sıralamaları"
      block:
        - name: "ORDER | gfs2_fs-clone → php-fpm-clone"
          command: >
            pcs constraint order start gfs2_fs-clone
            then php-fpm-clone
            id=order-gfs2fs-phpfpm
          register: web_order1
          failed_when:
            - web_order1.rc != 0
            - "'already exists' not in (web_order1.stderr | default(''))"
            - "'duplicate' not in (web_order1.stderr | default('') | lower)"
          changed_when: web_order1.rc == 0

        - name: "ORDER | gfs2_probe-clone → php-fpm-clone (GFS2 I/O sağlıklıysa web başlasın)"
          command: >
            pcs constraint order start gfs2_probe-clone
            then php-fpm-clone
            id=order-gfs2probe-phpfpm
          register: web_order_probe
          failed_when:
            - web_order_probe.rc != 0
            - "'already exists' not in (web_order_probe.stderr | default(''))"
            - "'duplicate' not in (web_order_probe.stderr | default('') | lower)"
            - "'does not exist' not in (web_order_probe.stderr | default(''))"
          changed_when: web_order_probe.rc == 0

        - name: "ORDER | postgresql → php-fpm-clone (DB hazır olunca web başlasın)"
          command: >
            pcs constraint order start postgresql
            then php-fpm-clone
            id=order-postgresql-phpfpm
          register: web_order_pgsql
          failed_when:
            - web_order_pgsql.rc != 0
            - "'already exists' not in (web_order_pgsql.stderr | default(''))"
            - "'duplicate' not in (web_order_pgsql.stderr | default('') | lower)"
          changed_when: web_order_pgsql.rc == 0

        - name: "ORDER | php-fpm-clone → nginx-clone (PHP hazır olunca nginx başlasın)"
          command: >
            pcs constraint order start php-fpm-clone
            then nginx-clone
            id=order-phpfpm-nginx
          register: web_order2
          failed_when:
            - web_order2.rc != 0
            - "'already exists' not in (web_order2.stderr | default(''))"
            - "'duplicate' not in (web_order2.stderr | default('') | lower)"
          changed_when: web_order2.rc == 0

        - name: "VERIFY | Web servisi constraint'leri doğrula"
          command: pcs constraint show --full
          register: web_constraints_verify
          changed_when: false
          failed_when: false

        - name: "ASSERT | order-gfs2fs-phpfpm mevcut olmalı"
          assert:
            that: "'order-gfs2fs-phpfpm' in web_constraints_verify.stdout"
            success_msg: "✓ order-gfs2fs-phpfpm constraint mevcut"
            fail_msg: "✗ order-gfs2fs-phpfpm constraint EKSIK — pcs constraint show ile kontrol edin"
          failed_when: false

        - name: "ASSERT | order-phpfpm-nginx mevcut olmalı"
          assert:
            that: "'order-phpfpm-nginx' in web_constraints_verify.stdout"
            success_msg: "✓ order-phpfpm-nginx constraint mevcut"
            fail_msg: "✗ order-phpfpm-nginx constraint EKSIK — pcs constraint show ile kontrol edin"
          failed_when: false

        - name: "RESULT | Web servisi sıralamaları"
          debug:
            msg: |
              ✓ Web servisi kaynak sıralamaları (en son iki servis php-fpm ve nginx):
                gfs2_fs-clone  ──┐
                                 ├──→ php-fpm-clone → nginx-clone
                postgresql     ──┘

              Constraint durumları:
                order-gfs2fs-phpfpm    : {{ '✓ MEVCUT' if 'order-gfs2fs-phpfpm' in web_constraints_verify.stdout else '✗ EKSİK' }}
                order-postgresql-phpfpm: {{ '✓ MEVCUT' if 'order-postgresql-phpfpm' in web_constraints_verify.stdout else '✗ EKSİK' }}
                order-phpfpm-nginx     : {{ '✓ MEVCUT' if 'order-phpfpm-nginx' in web_constraints_verify.stdout else '✗ EKSİK' }}
      rescue:
        - name: "WARN | Web servisi constraint uyarısı"
          debug:
            msg: |
              ⚠ Web servisi constraint'leri eklenirken sorun oluştu.
              Manuel eklemek için:
                pcs constraint order start gfs2_fs-clone then php-fpm-clone id=order-gfs2fs-phpfpm
                pcs constraint order start postgresql then php-fpm-clone id=order-postgresql-phpfpm
                pcs constraint order start php-fpm-clone then nginx-clone id=order-phpfpm-nginx

    # ---- Cleanup ve Durum Doğrulama ---------------------------------------
    - name: "CLEANUP | Web servisi resource hata sayaçlarını sıfırla"
      command: "pcs resource cleanup {{ item }}"
      loop:
        - php-fpm-clone
        - nginx-clone
      failed_when: false
      changed_when: false

    - name: "WAIT | Web servisi kaynaklarının başlamasını bekle (30s)"
      pause:
        seconds: 30

    - name: "WAIT | php-fpm-clone her iki node'da başlamasını bekle"
      command: pcs resource status php-fpm-clone
      register: phpfpm_wait
      retries: 20
      delay: 10
      until: >
        phpfpm_wait.stdout | regex_search('Started.*' + groups['cluster_nodes'][0].split('.')[0])
        and phpfpm_wait.stdout | regex_search('Started.*' + groups['cluster_nodes'][1].split('.')[0])
      changed_when: false
      failed_when: false

    - name: "WAIT | nginx-clone her iki node'da başlamasını bekle"
      command: pcs resource status nginx-clone
      register: nginx_wait
      retries: 20
      delay: 10
      until: >
        nginx_wait.stdout | regex_search('Started.*' + groups['cluster_nodes'][0].split('.')[0])
        and nginx_wait.stdout | regex_search('Started.*' + groups['cluster_nodes'][1].split('.')[0])
      changed_when: false
      failed_when: false

    - name: "TEST | VIP üzerinden HTTP erişim testi"
      uri:
        url: "http://{{ virtual_ip }}/"
        method: GET
        status_code: 200
        timeout: 15
      register: http_test
      failed_when: false
      delegate_to: "{{ groups['cluster_nodes'][0] }}"

    - name: "TEST | VIP üzerinden PHP erişim testi"
      uri:
        url: "http://{{ virtual_ip }}/index.php"
        method: GET
        status_code: 200
        timeout: 15
      register: php_test
      failed_when: false
      delegate_to: "{{ groups['cluster_nodes'][0] }}"

    - name: "RESULT | Web servisi erişim sonuçları"
      debug:
        msg: |
          ════════════════════════════════════════════════════
          WEB SERVİSİ TEST SONUÇLARI
          ════════════════════════════════════════════════════
          http://{{ virtual_ip }}/index.html : {{ '✓ HTTP 200 OK' if (http_test.status | default(0)) == 200 else '⚠ Erişilemiyor (rc=' + (http_test.status | default('?') | string) + ')' }}
          http://{{ virtual_ip }}/index.php  : {{ '✓ HTTP 200 OK (PHP-FPM çalışıyor)' if (php_test.status | default(0)) == 200 else '⚠ Erişilemiyor (rc=' + (php_test.status | default('?') | string) + ')' }}
          ════════════════════════════════════════════════════
          php-fpm-clone : {{ phpfpm_wait.stdout_lines | default(['durum alınamadı']) | join(' ') }}
          nginx-clone   : {{ nginx_wait.stdout_lines | default(['durum alınamadı']) | join(' ') }}

    - name: "RESULT | Web servisi kurulum özeti"
      debug:
        msg: |
          ✓ PLAY 11b TAMAMLANDI — Web Servisi Cluster'a Eklendi
            Nginx kök     : {{ nginx_web_root | default(gfs2_mount + '/html') }} (GFS2)
            Test sayfaları: index.html + index.php
            Cluster res   : php-fpm-clone + nginx-clone (Aktif/Aktif — Her 2 Node)
            Sıralama      : gfs2_fs-clone + postgresql → php-fpm-clone → nginx-clone
            Son iki servis: php-fpm → nginx (en son başlar)
            Erişim        : http://{{ virtual_ip }}/


# =============================================================================
# PLAY 12: POSTGRESQL KURULUMU VE YAPILANDIRMASI
# =============================================================================
- name: "PLAY 12/13 | PostgreSQL Kurulumu ve Yapılandırması"
  hosts: "{{ groups['cluster_nodes'][0] }}"
  gather_facts: no
  become: yes
  any_errors_fatal: true

  tasks:
    # FIX: wait_for(path) yerine mountpoint komutu ile gerçek mount kontrolü
    # Eski hata: wait_for path={{ pgsql_mount }} → dizin PLAY10'da oluşturulduğundan
    # her zaman "mevcut" görünüyor, mount edilip edilmediğini test etmiyordu.
    - name: "PGSQL | pgsql_fs'in mount olmasını bekleniyor"
      command: "mountpoint -q {{ pgsql_mount }}"
      register: pgsql_mount_wait
      retries: 18
      delay: 10
      until: pgsql_mount_wait.rc == 0
      changed_when: false
      failed_when: false

    - name: "ASSERT | pgsql_fs mount edilmiş olmalı"
      assert:
        that: pgsql_mount_wait.rc == 0
        success_msg: "✓ {{ pgsql_mount }} mount edildi"
        fail_msg: |
          ✗ HATA: {{ pgsql_mount }} mount edilmedi!
          ÇÖZÜM:
            pcs resource status pgsql_lv_activate
            pcs resource status pgsql_fs
            pcs resource cleanup pgsql_lv_activate
            pcs resource cleanup pgsql_fs

    - name: "PGSQL | Mount noktası izinleri"
      file:
        path: "{{ pgsql_mount }}"
        state: directory
        owner: postgres
        group: postgres
        mode: '0700'

    - name: "PGSQL | PostgreSQL data dizini kontrolü"
      stat:
        path: "{{ pgsql_data_dir }}/PG_VERSION"
      register: pg_data_check

    - name: "PGSQL | initdb - PostgreSQL başlatılıyor"
      block:
        - name: "initdb | Data dizini oluştur"
          file:
            path: "{{ pgsql_data_dir }}"
            state: directory
            owner: postgres
            group: postgres
            mode: '0700'
          when: not pg_data_check.stat.exists

        - name: "initdb | initdb çalıştır"
          command: "/usr/pgsql-{{ pgsql_version }}/bin/initdb -D {{ pgsql_data_dir }} --encoding=UTF8 --locale=en_US.UTF-8"
          become_user: postgres
          when: not pg_data_check.stat.exists
          register: initdb_result

        # FIX: initdb_result tanımlı olup olmadığı kontrol ediliyor
        # Eski hata: when: not pg_data_check.stat.exists false olunca initdb_result
        # register edilmiyordu → "initdb_result is changed" → UndefinedError
        - name: "initdb | Sonuç"
          debug:
            msg: "✓ PostgreSQL başlatıldı: {{ pgsql_data_dir }}"
          when: initdb_result is defined and initdb_result is changed

        - name: "initdb | Zaten mevcut"
          debug:
            msg: "✓ PostgreSQL data dizini zaten mevcut, atlanıyor"
          when: pg_data_check.stat.exists
      rescue:
        - name: "ERROR | initdb hatası"
          debug:
            msg: |
              ✗ HATA: PostgreSQL initdb başarısız!
              ÇÖZÜM:
                su - postgres -c "/usr/pgsql-{{ pgsql_version }}/bin/initdb -D {{ pgsql_data_dir }}"
                ls -la {{ pgsql_data_dir }}
                df -h {{ pgsql_mount }}
              Hata: {{ ansible_failed_result.msg | default('bilinmiyor') }}
          failed_when: true

    - name: "PGSQL | postgresql.conf yapılandırılıyor"
      block:
        - name: "CONF | listen_addresses"
          lineinfile:
            path: "{{ pgsql_data_dir }}/postgresql.conf"
            regexp: '^#?listen_addresses'
            line: "listen_addresses = '*'"
            backup: yes

        - name: "CONF | port"
          lineinfile:
            path: "{{ pgsql_data_dir }}/postgresql.conf"
            regexp: '^#?port\s*='
            line: "port = {{ pgsql_port }}"

        - name: "CONF | max_connections"
          lineinfile:
            path: "{{ pgsql_data_dir }}/postgresql.conf"
            regexp: '^#?max_connections'
            line: "max_connections = 200"

        - name: "CONF | log_destination"
          lineinfile:
            path: "{{ pgsql_data_dir }}/postgresql.conf"
            regexp: '^#?log_destination'
            line: "log_destination = 'stderr'"

        - name: "CONF | logging_collector"
          lineinfile:
            path: "{{ pgsql_data_dir }}/postgresql.conf"
            regexp: '^#?logging_collector'
            line: "logging_collector = on"

        - name: "RESULT | postgresql.conf yapılandırıldı"
          debug:
            msg: "✓ postgresql.conf yapılandırıldı"

    - name: "PGSQL | pg_hba.conf yapılandırılıyor"
      blockinfile:
        path: "{{ pgsql_data_dir }}/pg_hba.conf"
        block: |
          # ---- CLUSTER ACCESS (ANSIBLE MANAGED) ----
          {% for net in pgsql_allowed_networks %}
          host    all             all             {{ net }}          md5
          {% endfor %}
          # ---- LOCAL SOCKET ----
          local   all             postgres                           peer
          local   all             all                                md5
        marker: "# {mark} ANSIBLE MANAGED HA CLUSTER ACCESS"
        backup: yes

    - name: "RESULT | pg_hba.conf yapılandırıldı"
      debug:
        msg: "✓ pg_hba.conf yapılandırıldı"

    # FIX: PostgreSQL systemd servisi TÜM cluster node'larında maskeleniyor
    # Eski hata: Sadece groups['cluster_nodes'][1]'e delegate ediliyordu,
    # daha fazla node olursa atlanırdı. Döngü ile tüm node'lar kapsanıyor.
    - name: "SERVICE | PostgreSQL systemd servisi maskeleniyor (tüm node'lar)"
      systemd:
        name: "postgresql-{{ pgsql_version }}"
        state: stopped
        enabled: no
        masked: yes
      delegate_to: "{{ item }}"
      loop: "{{ groups['cluster_nodes'] }}"
      failed_when: false

    - name: "RESULT | PostgreSQL maskeleme tamamlandı"
      debug:
        msg: "✓ postgresql-{{ pgsql_version }} tüm node'larda maskelendi (Cluster yönetiyor)"

    # ---- PostgreSQL Cluster Kaynağı ----------------------------------------
    # KÖK NEDEN: pcs resource create sonrası Pacemaker tüm node'larda probe yapar.
    # clstr02'de pgsql_fs mount'lu değil → postgresql.conf yok → "not installed".
    # on-fail=block devreye girer → BLOCKED.
    #
    # DOĞRU ÇÖZÜM: target-role=Stopped ile oluştur → tüm constraint'leri ekle →
    # cleanup (stale probe temizle) → sonra Started yap → wait.
    # Bu şekilde Pacemaker constraint'leri bilmeden probe yapmaz.
    - name: "RESOURCE | PostgreSQL cluster kaynağı"
      block:
        - name: "CHECK | postgresql kaynağı mevcut mu"
          command: pcs resource config postgresql
          register: pgsql_res_check
          changed_when: false
          failed_when: false

        # STRATEJİ: on-fail=fence (stop dahil)
        #
        # NEDEN fence? (block değil):
        #   Yaşanan senaryo: iSCSI kesintisi → XFS kapanır → postgresql stop →
        #   'not installed' (postgresql.conf yok) → BLOCKED → EL MÜDAHALESİ GEREKİR
        #
        #   on-fail=fence ile bu senaryo otomatik çözülür:
        #   stop fail → node fence (IPMI reboot) → iSCSI yeniden bağlanır →
        #   XFS temiz açılır → VIP diğer node'da zaten aktif → postgresql orada başlar
        #
        # FENCE DÖNGÜSÜ RİSKİ NEDEN YOK?
        #   1. Constraint zinciri: postgresql, pgsql_fs olmadan başlamaz (ORDER/COLOCATION)
        #   2. Fence edilen node reboot sonrası pgsql_fs olmadan postgresql çalıştırmaz
        #   3. migration-threshold=3: 3 fence sonrası kaynak başka node'a taşınır
        #   4. failure-timeout=3600s (global rsc_defaults): 1 saat sonra sayaç sıfırlanır
        #
        # ESKI on-fail=block SORUNU:
        #   - El müdahalesi gerekiyordu: pcs resource cleanup postgresql
        #   - Pacemaker uyarısı: failure-timeout + on-fail=block çakışması
        #   - T11 testi BLOCKED nedeniyle rescue'a düşüyordu
        - name: "CREATE | postgresql (Stopped — constraint'ler eklenene kadar)"
          command: >
            pcs resource create postgresql ocf:heartbeat:pgsql
            pgctl="/usr/pgsql-{{ pgsql_version }}/bin/pg_ctl"
            psql="/usr/pgsql-{{ pgsql_version }}/bin/psql"
            pgdata="{{ pgsql_data_dir }}"
            pgport={{ pgsql_port }}
            rep_mode=none
            op start   timeout={{ resource_start_timeout }}          on-fail=restart
            op stop    timeout={{ resource_stop_timeout }}           on-fail=fence
            op monitor interval={{ resource_monitor_interval }} timeout=30s on-fail=restart
            meta target-role=Stopped
          when: pgsql_res_check.rc != 0

        - name: "RESULT | postgresql kaynağı oluşturuldu (Stopped)"
          debug:
            msg: "✓ postgresql cluster kaynağı {{ 'oluşturuldu (Stopped)' if pgsql_res_check.rc != 0 else 'zaten mevcut' }}"

        # IDEMPOTENT: Mevcut postgresql ve pgsql_fs stop on-fail=block → fence
        # RHEL9 pcs 0.11: 'op update' yok — 'op delete + op add' kullanılır
        # Shell script yerine Ansible task'ları — Jinja2 + yorum çakışması önlenir

        - name: "FIX | postgresql mevcut stop on-fail değeri"
          shell: >
            pcs resource config postgresql 2>/dev/null |
            grep -A3 'stop:' | grep 'on-fail' | awk -F'=' '{print $NF}' | tr -d ' ' || echo "none"
          register: pgsql_stop_onfail
          changed_when: false
          failed_when: false
          when: pgsql_res_check.rc == 0

        - name: "FIX | postgresql stop op delete (block ise)"
          command: pcs resource op delete postgresql stop
          register: pgsql_op_del
          failed_when: pgsql_op_del.rc != 0 and 'does not exist' not in (pgsql_op_del.stderr | default(''))
          changed_when: pgsql_op_del.rc == 0
          when:
            - pgsql_res_check.rc == 0
            - pgsql_stop_onfail.stdout | default('none') | trim == 'block'

        - name: "FIX | postgresql stop op add (on-fail=fence)"
          command: pcs resource op add postgresql stop timeout=60s on-fail=fence
          register: pgsql_op_add
          failed_when: pgsql_op_add.rc != 0 and 'already exists' not in (pgsql_op_add.stderr | default(''))
          changed_when: pgsql_op_add.rc == 0
          when:
            - pgsql_res_check.rc == 0
            - pgsql_stop_onfail.stdout | default('none') | trim == 'block'

        - name: "FIX | pgsql_fs mevcut stop on-fail değeri"
          shell: >
            pcs resource config pgsql_fs 2>/dev/null |
            grep -A3 'stop:' | grep 'on-fail' | awk -F'=' '{print $NF}' | tr -d ' ' || echo "none"
          register: pgsqlfs_stop_onfail
          changed_when: false
          failed_when: false

        - name: "FIX | pgsql_fs stop op delete (block ise)"
          command: pcs resource op delete pgsql_fs stop
          register: pgsqlfs_op_del
          failed_when: pgsqlfs_op_del.rc != 0 and 'does not exist' not in (pgsqlfs_op_del.stderr | default(''))
          changed_when: pgsqlfs_op_del.rc == 0
          when: pgsqlfs_stop_onfail.stdout | default('none') | trim == 'block'

        - name: "FIX | pgsql_fs stop op add (on-fail=fence)"
          command: pcs resource op add pgsql_fs stop timeout=60s on-fail=fence
          register: pgsqlfs_op_add
          failed_when: pgsqlfs_op_add.rc != 0 and 'already exists' not in (pgsqlfs_op_add.stderr | default(''))
          changed_when: pgsqlfs_op_add.rc == 0
          when: pgsqlfs_stop_onfail.stdout | default('none') | trim == 'block'

        - name: "FIX | postgresql meta failure-timeout kaldır (gerekirse)"
          shell: >
            pcs resource config postgresql 2>/dev/null | grep -q 'failure-timeout' &&
            pcs resource meta postgresql failure-timeout= && echo "removed" || echo "not_present"
          register: pgsql_ft_remove
          changed_when: "'removed' in pgsql_ft_remove.stdout"
          failed_when: false

        - name: "FIX | pgsql_fs meta failure-timeout kaldır (gerekirse)"
          shell: >
            pcs resource config pgsql_fs 2>/dev/null | grep -q 'failure-timeout' &&
            pcs resource meta pgsql_fs failure-timeout= && echo "removed" || echo "not_present"
          register: pgsqlfs_ft_remove
          changed_when: "'removed' in pgsqlfs_ft_remove.stdout"
          failed_when: false

        - name: "INFO | on-fail=fence güncelleme özeti"
          debug:
            msg: |
              postgresql stop on-fail: {{ pgsql_stop_onfail.stdout | default('yeni kaynak') | trim }} → {{ 'fence (güncellendi)' if (pgsql_op_add is defined and pgsql_op_add.changed | default(false)) else 'fence (zaten doğru veya yeni kaynak)' }}
              pgsql_fs   stop on-fail: {{ pgsqlfs_stop_onfail.stdout | default('?') | trim }} → {{ 'fence (güncellendi)' if (pgsqlfs_op_add is defined and pgsqlfs_op_add.changed | default(false)) else 'fence (zaten doğru)' }}

        # Constraint'ler önce eklenir, resource sonra başlatılır.
        #
        # ORDER zinciri (başlangıç sırası):
        #   lvmlockd → pgsql_lv_activate → pgsql_fs → postgresql
        #
        # COLOCATION zinciri (aynı node zorunluluğu):
        #   postgresql ↔ pgsql_fs ↔ pgsql_lv_activate ↔ vip
        #   (her resource bir öncekinin olduğu node'a bağlı)

        - name: "ORDER | pgsql_fs → postgresql"
          command: >
            pcs constraint order start pgsql_fs
            then postgresql
            id=order-psqlfs-postgresql
          register: pgsql_order
          failed_when: pgsql_order.rc != 0 and 'already exists' not in (pgsql_order.stderr | default(''))
          changed_when: pgsql_order.rc == 0

        # postgresql neredeyse pgsql_fs orada (zincirin son halkası)
        - name: "COLOCATION | postgresql ile pgsql_fs"
          command: >
            pcs constraint colocation add postgresql with pgsql_fs INFINITY
            id=colo-postgresql-psqlfs
          register: pgsql_colo
          failed_when: pgsql_colo.rc != 0 and 'already exists' not in (pgsql_colo.stderr | default(''))
          changed_when: pgsql_colo.rc == 0

        - name: "VERIFY | Tam constraint listesi"
          command: pcs constraint
          register: constraint_check
          changed_when: false
          failed_when: false

        - name: "RESULT | Constraint listesi"
          debug:
            msg: "{{ constraint_check.stdout_lines }}"

        # Stale probe kayıtlarını temizle (önceki başarısız denemelerden kalabilir)
        - name: "CLEANUP | postgresql stale probe/hata kayıtları sıfırla"
          command: pcs resource cleanup postgresql
          failed_when: false
          changed_when: false

        # Artık constraint'ler tam — kaynağı başlat
        - name: "START | postgresql target-role=Started yap"
          command: pcs resource meta postgresql target-role=Started
          when: pgsql_res_check.rc != 0
          failed_when: false

        - name: "WAIT | postgresql'in vip ile aynı node'da başlamasını bekle"
          command: pcs resource status postgresql
          register: pgsql_wait
          retries: 24
          delay: 10
          until: "'Started' in pgsql_wait.stdout"
          changed_when: false
          failed_when: >
            pgsql_wait.attempts | default(0) >= 24
            and 'Started' not in pgsql_wait.stdout

        - name: "RESULT | PostgreSQL kaynak durumu"
          debug:
            msg: "{{ pgsql_wait.stdout_lines }}"

        - name: "RESULT | PostgreSQL kurallar ve başlatma tamamlandı"
          debug:
            msg: "✓ PostgreSQL constraint'ler eklendi, kaynak başlatıldı"
      rescue:
        - name: "ERROR | PostgreSQL kaynak hatası"
          debug:
            msg: |
              ✗ HATA: PostgreSQL cluster kaynağı oluşturulamadı!
              KONTROL:
                pcs resource status postgresql
                pcs resource cleanup postgresql
                pcs resource status pgsql_lv_activate
                pcs resource status pgsql_fs
                df -h {{ pgsql_mount }}
                ls -la {{ pgsql_data_dir }}
              Hata: {{ ansible_failed_result.msg | default('bilinmiyor') }}
          failed_when: true


# =============================================================================
# PLAY 13b: POSTGRESQL KULLANICI PAROLASI
# =============================================================================
# Bu play cluster kurulumu tamamlandıktan sonra çalışır.
# Node'lardan bağımsız olarak Virtual IP (VIP) üzerinden PostgreSQL'e bağlanır.
# Parola hosts.yml → pgsql_password değişkeninden okunur.
#
# Neden VIP üzerinden?
#   - VIP her zaman aktif node'u gösterir; node ismi veya IP'si bilinmeden çalışır.
#   - Node failover olsa bile parola zaten ayarlandığından tekrar çalışmaz (idempotent).
#   - Kurulumu yapan makine cluster node olmak zorunda değildir.
# =============================================================================
- name: "PLAY 13b/13 | PostgreSQL Kullanıcı Parolası (VIP üzerinden)"
  hosts: "{{ groups['cluster_nodes'][0] }}"
  gather_facts: no
  become: yes
  any_errors_fatal: false

  # Neden cluster_nodes[0]?
  #   - psql binary cluster node'larında kurulu, bastion'da olmayabilir.
  #   - VIP aktif node'u gösterir; psql -h VIP ile node'dan bağımsız erişilir.
  #   - pg_hba.conf → 127.0.0.1 peer yerine -h VIP ile md5 auth kullanılır.
  #   - İdempotent: parola zaten ayarlıysa "ALTER ROLE" başarıyla döner.

  tasks:
    - name: "PGSQL PAROLA | VIP üzerinden PostgreSQL portu erişilebilir mi"
      wait_for:
        host: "{{ virtual_ip }}"
        port: "{{ pgsql_port }}"
        timeout: 120
        delay: 5
      delegate_to: localhost

    - name: "PGSQL PAROLA | psql binary mevcut mu"
      command: "which psql"
      register: psql_which
      changed_when: false
      failed_when: false

    - name: "PGSQL PAROLA | psql PATH'i"
      set_fact:
        psql_bin: "{{ psql_which.stdout | trim if psql_which.rc == 0 else '/usr/pgsql-' + pgsql_version + '/bin/psql' }}"

    - name: "INFO | Kullanılacak psql binary"
      debug:
        msg: "psql binary: {{ psql_bin }}"

    # İlk bağlantı local UNIX socket + peer auth ile yapılır (parola henüz yok).
    # become_user: postgres → peer auth geçer, PGPASSWORD gerekmez.
    # -h belirtilmez → UNIX socket kullanılır → pg_hba.conf: local all postgres peer
    # Parola set edildikten sonra VIP üzerinden md5 ile bağlanılabilir.
    - name: "PGSQL PAROLA | postgres parolası local socket üzerinden ayarlanıyor"
      shell: |
        {{ psql_bin }} \
          -p {{ pgsql_port }} \
          -U postgres \
          -c "ALTER ROLE postgres WITH PASSWORD '{{ pgsql_password }}';"
      become: yes
      become_user: postgres
      register: alter_role_result
      changed_when: "'ALTER ROLE' in alter_role_result.stdout"
      failed_when: alter_role_result.rc != 0
      no_log: false

    - name: "RESULT | psql stdout/stderr"
      debug:
        msg: |
          rc     : {{ alter_role_result.rc }}
          stdout : {{ alter_role_result.stdout }}
          stderr : {{ alter_role_result.stderr }}

    - name: "RESULT | postgres parolası ayarlandı"
      debug:
        msg: |
          ✓ postgres kullanıcısı parolası ayarlandı (local peer auth)
            Artık VIP üzerinden bağlanılabilir:
            psql -h {{ virtual_ip }} -p {{ pgsql_port }} -U postgres
      when: alter_role_result.rc == 0


# =============================================================================
# PLAY 13: SON DOĞRULAMA VE TEST
# =============================================================================
- name: "PLAY 13/13 | Son Doğrulama ve Testler"
  hosts: "{{ groups['cluster_nodes'][0] }}"
  gather_facts: no
  become: yes

  tasks:
    - name: "VERIFY | Kurulum sonrası tüm resource hata sayaçlarını sıfırla"
      command: pcs resource cleanup
      failed_when: false
      changed_when: false

    - name: "VERIFY | Tüm kaynakların başlamasını bekleniyor"
      pause:
        seconds: 45

    - name: "VERIFY | Cluster genel durumu"
      command: pcs status
      register: final_cluster_status
      changed_when: false
      failed_when: false

    - name: "RESULT | Cluster Durumu"
      debug:
        msg: "{{ final_cluster_status.stdout_lines }}"

    - name: "VERIFY | Kaynak durumu"
      command: pcs resource status
      register: resource_check
      changed_when: false
      failed_when: false

    - name: "VERIFY | Tam cluster durumu"
      command: pcs status --full
      register: full_status
      changed_when: false
      failed_when: false

    # FIX: pcs stonith status - RHEL9 pcs versiyonu uyumlu fallback
    # Eski durum: "pcs stonith status" bazı versiyonlarda "pcs stonith" olarak değişti
    - name: "TEST | STONITH durumu (pcs stonith)"
      command: pcs stonith
      register: stonith_status
      changed_when: false
      failed_when: false

    - name: "TEST | STONITH durumu (fallback: pcs resource status fence)"
      command: "pcs resource status"
      register: stonith_fallback
      changed_when: false
      failed_when: false
      when: stonith_status.rc != 0

    - name: "RESULT | STONITH durumu"
      debug:
        msg: |
          {% if stonith_status.rc == 0 %}
          {{ stonith_status.stdout_lines }}
          {% else %}
          ℹ Stonith durumu (pcs resource status'dan):
          {{ stonith_fallback.stdout_lines if stonith_fallback is defined else ['Alınamadı'] }}
          {% endif %}

    - name: "TEST | Constraint'ler"
      command: pcs constraint show --full
      register: constraint_check
      changed_when: false
      failed_when: false

    - name: "RESULT | Constraint'ler"
      debug:
        msg: "{{ constraint_check.stdout_lines }}"

    - name: "TEST | GFS2 mount durumu"
      command: "mountpoint -q {{ gfs2_mount }}"
      register: gfs2_mount_check
      changed_when: false
      failed_when: false

    - name: "RESULT | GFS2 mount"
      debug:
        msg: "{{ '✓ GFS2 mount edildi: ' + gfs2_mount if gfs2_mount_check.rc == 0 else '⚠ GFS2 henüz mount edilmedi (kaynak başlatılıyor olabilir)' }}"

    - name: "TEST | PostgreSQL disk mount durumu"
      command: "mountpoint -q {{ pgsql_mount }}"
      register: pgsql_mount_check
      changed_when: false
      failed_when: false

    - name: "RESULT | PostgreSQL mount"
      debug:
        msg: "{{ '✓ PostgreSQL disk mount edildi: ' + pgsql_mount if pgsql_mount_check.rc == 0 else 'ℹ PostgreSQL disk bu node aktif değilse mount edilmemesi NORMALDIR' }}"

    - name: "TEST | Virtual IP aktif mi"
      command: "ip addr show"
      register: vip_check_raw
      changed_when: false
      failed_when: false

    - name: "RESULT | VIP durumu"
      debug:
        msg: "{{ '✓ VIP bu node aktif: ' + virtual_ip if virtual_ip in vip_check_raw.stdout else 'ℹ VIP diğer node üzerinde aktif olabilir (normal)' }}"

    - name: "TEST | Quorum durumu"
      command: corosync-quorumtool -s
      register: quorum_check
      changed_when: false
      failed_when: false

    - name: "RESULT | Quorum"
      debug:
        msg: "{{ quorum_check.stdout_lines }}"

    - name: "VERIFY | Başarısız kaynak sayısı"
      command: pcs resource failcount show
      register: failcount
      changed_when: false
      failed_when: false

    - name: "INFO | Failcount"
      debug:
        msg: "{{ failcount.stdout_lines | default(['(boş)']) }}"

    - name: "VERIFY | Başarısız kaynak var mı?"
      command: pcs status xml
      register: pcs_xml_status
      changed_when: false
      failed_when: false

    - name: "WARN | Başarısız kaynak uyarısı"
      debug:
        msg: |
          ⚠ UYARI: Başarısız kaynaklar olabilir!
          KONTROL:
            pcs status
            pcs resource cleanup
            journalctl -u pacemaker -n 100
      when: "'failed' in (pcs_xml_status.stdout | lower) and 'failed=\"0\"' not in pcs_xml_status.stdout"

    - name: "CLEANUP | Kurulum VIP tercih kısıtlaması kaldırılıyor"
      command: >
        pcs constraint remove loc-vip-prefer-node0
      register: vip_loc_remove
      failed_when: false
      changed_when: vip_loc_remove.rc == 0

    - name: "INFO | VIP kısıtlama kaldırma sonucu"
      debug:
        msg: "{{ '✓ Kurulum VIP tercihi kaldırıldı — VIP artık serbestçe failover yapabilir' if vip_loc_remove.rc == 0 else 'ℹ VIP kurulum tercihi zaten yoktu' }}"

    - name: "TEST | php-fpm-clone kaynak durumu"
      command: pcs resource status php-fpm-clone
      register: phpfpm_final_status
      changed_when: false
      failed_when: false

    - name: "TEST | nginx-clone kaynak durumu"
      command: pcs resource status nginx-clone
      register: nginx_final_status
      changed_when: false
      failed_when: false

    - name: "RESULT | Web servisi kaynak durumu"
      debug:
        msg: |
          php-fpm-clone: {{ phpfpm_final_status.stdout_lines | default(['(alınamadı)']) }}
          nginx-clone  : {{ nginx_final_status.stdout_lines | default(['(alınamadı)']) }}

    - name: "TEST | VIP üzerinden HTTP son kontrolü"
      uri:
        url: "http://{{ virtual_ip }}/"
        method: GET
        status_code: 200
        timeout: 10
      register: final_http_check
      failed_when: false
      delegate_to: localhost

    - name: "TEST | VIP üzerinden PHP son kontrolü"
      uri:
        url: "http://{{ virtual_ip }}/index.php"
        method: GET
        status_code: 200
        timeout: 10
      register: final_php_check
      failed_when: false
      delegate_to: localhost

    - name: "RESULT | Web servisi son test sonuçları"
      debug:
        msg: |
          ════════════════════════════════════════════════
          WEB SERVİSİ SON KONTROL
          ════════════════════════════════════════════════
          HTML : {{ '✓ HTTP 200 OK' if (final_http_check.status | default(0)) == 200 else '⚠ Erişilemiyor' }}
          PHP  : {{ '✓ HTTP 200 OK (PHP-FPM çalışıyor)' if (final_php_check.status | default(0)) == 200 else '⚠ Erişilemiyor' }}
          URL  : http://{{ virtual_ip }}/
          ════════════════════════════════════════════════

    - name: "FINAL | Kurulum tamamlama raporu"
      debug:
        msg: |
          ╔══════════════════════════════════════════════════════════════════════╗
          ║         RED HAT 9 HA CLUSTER KURULUMU TAMAMLANDI                    ║
          ╠══════════════════════════════════════════════════════════════════════╣
          ║  Cluster Adı   : {{ cluster_name }}
          ║  Node'lar      :
          {% for host in groups['cluster_nodes'] %}
          ║    {{ loop.index }}. {{ host }} ({{ hostvars[host].ansible_host }} / {{ hostvars[host].cluster_ip }})
          {% endfor %}
          ║  Quorum        : {{ groups['quorum_device'][0] }} ({{ hostvars[groups['quorum_device'][0]].ansible_host }})
          ║  Virtual IP    : {{ virtual_ip }}/{{ virtual_ip_cidr }}
          ╠══════════════════════════════════════════════════════════════════════╣
          ║  DEPOLAMA MOD:
          ║    iSCSI      : {{ 'KURULDU' if configure_iscsi | default(true) | bool else 'ATLANARAK mevcut yapı kullanıldı' }}
          ║    Multipath  : {{ 'KURULDU' if configure_multipath | default(true) | bool else 'ATLANARAK mevcut yapı kullanıldı' }}
          ╠══════════════════════════════════════════════════════════════════════╣
          ║  DEPOLAMA:
          ║    GFS2  Disk  : {{ shared_disk }} → VG: {{ shared_vg }}
          ║    PgSQL Disk  : {{ db_disk }} → VG: {{ db_vg }}
          ║    GFS2 LV     : /dev/{{ shared_vg }}/{{ gfs2_lv }} ({{ gfs2_lv_size }})
          ║                  Mount: {{ gfs2_mount }} (Aktif/Aktif - Her 2 Node)
          ║    pgsql LV    : /dev/{{ db_vg }}/{{ pgsql_lv }} ({{ pgsql_lv_size }})
          ║                  Mount: {{ pgsql_mount }} (Aktif/Pasif - Sadece 1 Node)
          ╠══════════════════════════════════════════════════════════════════════╣
          ║  WEB SERVİSİ:
          ║    Sunucu      : Nginx (Aktif/Aktif - Her 2 Node)
          ║    PHP Desteği : PHP-FPM (Aktif/Aktif - Her 2 Node)
          ║    Web Kök     : {{ nginx_web_root | default(gfs2_mount + '/html') }}
          ║    Test URL    : http://{{ virtual_ip }}/index.html (HTML)
          ║                  http://{{ virtual_ip }}/index.php  (PHP-FPM)
          ╠══════════════════════════════════════════════════════════════════════╣
          ║  KAYNAKLAR:
          ║    fence_ipmi_<node>      - STONITH (IPMI/iDRAC/iLO)
          ║    dlm-clone              - DLM (Her 2 Node)
          ║    lvmlockd-clone         - LVM Locking (Her 2 Node)
          ║    gfs2_lv_activate-clone - GFS2 LV (Her 2 Node)
          ║    gfs2_fs-clone          - GFS2 Filesystem (Her 2 Node)
          ║    gfs2_health-clone      - GFS2 I/O Sağlık Denetçisi (Her 2 Node, 15s)
          ║    php-fpm-clone          - PHP-FPM (Her 2 Node)
          ║    nginx-clone            - Nginx Web Sunucu (Her 2 Node)
          ║    pgsql_lv_activate      - pgsql LV (Sadece Aktif Node)
          ║    pgsql_fs               - pgsql Filesystem (Sadece Aktif Node)
          ║    vip                    - Virtual IP (Sadece Aktif Node)
          ║    postgresql             - PostgreSQL (Sadece Aktif Node)
          ╠══════════════════════════════════════════════════════════════════════╣
          ║  KAYNAK SIRALAMA (Doğru sıra):
          ║    dlm-clone → lvmlockd-clone → gfs2_lv_activate-clone → gfs2_fs-clone
          ║    lvmlockd-clone → pgsql_lv_activate → pgsql_fs → postgresql
          ║    gfs2_fs-clone + postgresql → php-fpm-clone → nginx-clone
          ║    (php-fpm ve nginx EN SON iki kaynak)
          ║    Colocation: postgresql + pgsql_fs + pgsql_lv_activate ↔ vip
          ╠══════════════════════════════════════════════════════════════════════╣
          ║  KONTROL KOMUTLARI:
          ║    pcs status              - Cluster durumu
          ║    pcs resource status     - Kaynak durumu
          ║    pcs stonith             - STONITH durumu
          ║    pcs constraint show     - Constraint'ler
          ║    pcs quorum status       - Quorum durumu
          ║    corosync-quorumtool -s  - Quorum ayrıntı
          ║    crm_verify -L -V        - Yapılandırma doğrulama
          ╠══════════════════════════════════════════════════════════════════════╣
          ║  WEB / NGINX KONTROL:
          ║    curl http://{{ virtual_ip }}/                    - HTTP testi
          ║    curl http://{{ virtual_ip }}/index.php           - PHP-FPM testi
          ║    curl http://{{ virtual_ip }}{{ nginx_status_path | default('/nginx_status') }} - Nginx durum
          ║    pcs resource status nginx-clone   - Nginx cluster durumu
          ║    pcs resource status php-fpm-clone - PHP-FPM cluster durumu
          ║    journalctl -u nginx -f             - Nginx logları (*)
          ║    journalctl -u php-fpm -f           - PHP-FPM logları (*)
          ║    (* Cluster yönetiyorsa Pacemaker/OCF logları kullanın)
          ╠══════════════════════════════════════════════════════════════════════╣
          ║  SORUN AYIKLAMA:
          ║    journalctl -u pacemaker -f   - Pacemaker logları
          ║    journalctl -u corosync  -f   - Corosync logları
          ║    pcs resource cleanup         - Hata sayaçlarını sıfırla
          ║    pcs resource debug-start <r> - Kaynağı debug başlat
          ╚══════════════════════════════════════════════════════════════════════╝

