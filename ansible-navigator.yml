---
ansible-navigator:
  ansible:
    config:
      path: ./ansible.cfg
  execution-environment:
    container-engine: podman
    enabled: true
    image: registry.redhat.io/ansible-automation-platform-24/ee-supported-rhel9:1.0
    pull:
      policy: never
  logging:
    file: /tmp/ansible-navigator.log
    level: info
  mode: stdout
  playbook-artifact:
    enable: true
    save-as: playbook-artifacts/{playbook_name}-{time_stamp}.json
