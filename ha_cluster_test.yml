            nginx httpd param  : {{ '✓' if t14_nginx_httpd_param.stdout | trim | int > 0 else '✗ EKSİK' }}
            php-pgsql paketi   : {{ '✓' if t14_php_pgsql_pkg.results | selectattr('rc', 'eq', 0) | list | length == groups['cluster_nodes'] | length else '✗ EKSİK' }}
          CLUSTER KAYNAKLARI:
            php-fpm-clone      : {{ '✓ Her 2 node Started' if (t14_phpfpm_status.stdout | regex_search('Started.*' + groups['cluster_nodes'][0].split('.')[0])) else '✗ Kontrol gerekli' }}
            nginx-clone        : {{ '✓ Her 2 node Started' if (t14_nginx_status.stdout | regex_search('Started.*' + groups['cluster_nodes'][0].split('.')[0])) else '✗ Kontrol gerekli' }}
          CONSTRAINT'LER:
            order-gfs2fs-phpfpm     : {{ '✓' if 'order-gfs2fs-phpfpm' in t14_constraints.stdout else '✗ EKSİK' }}
            order-postgresql-phpfpm : {{ '✓' if 'order-postgresql-phpfpm' in t14_constraints.stdout else '✗ EKSİK' }}
            order-phpfpm-nginx      : {{ '✓' if 'order-phpfpm-nginx' in t14_constraints.stdout else '✗ EKSİK' }}
          HTTP TESTLERİ:
            index.html         : {{ '✓ HTTP 200' if t14_html_test.status | default(0) == 200 else '✗ ' + (t14_html_test.status | default('?') | string) }}
            index.php          : {{ '✓ HTTP 200' if t14_php_test.status | default(0) == 200 else '✗ ' + (t14_php_test.status | default('?') | string) }}
            nginx_status       : {{ '✓ OK' if t14_status_test.status | default(0) == 200 else '⚠ ' + (t14_status_test.status | default('?') | string) }}
          GFS2 TESTİ:
            Yazma (nginx user) : {{ '✓ Başarılı' if t14_gfs2_write.rc | default(1) == 0 else '✗ Başarısız' }}
            Çapraz-node okuma  : {{ '✓ Başarılı' if t14_gfs2_cross_read.rc | default(1) == 0 else '✗ Başarısız' }}
          POSTGRESQL (PHP):
            pg_connect test    : {{ '✓ Bağlandı' if t14_pgsql_php_test.stdout | default('') is search('^OK:') else '✗ ' + t14_pgsql_php_test.stdout | default('?') }}
          CLEANUP TESTİ:
            Cleanup sonrası    : {{ '✓ HTTP 200' if t14_after_cleanup.status | default(0) == 200 else '✗ Erişilemiyor' }}
          ══════════════════════════════════════════════════


# =============================================================================
# T13: TAM CLUSTER YENİDEN BAŞLATMA
# =============================================================================
- name: "T13 | Tam Cluster Yeniden Başlatma Testi"
  hosts: "{{ groups['cluster_nodes'][0] }}"
  gather_facts: no
  become: yes
  tags: test_T13
  vars:
    restart_wait: 180

  tasks:
    - name: "T13 | Banner"
      debug:
        msg: "════════ T13: TAM CLUSTER YENİDEN BAŞLATMA ════════"


    # ── Pre-test cluster guard ────────────────────────────────────────────────
    # Her testten önce cluster'ın iki node'da da sağlıklı olduğunu doğrular.
    # Önceki testten kalan fence aksiyonları / OFFLINE node varsa bekler.
    - name: "{{ ansible_play_name | regex_replace(' Testi.*', '') }} | GUARD | Fencing geçmişi ve constraint temizliği"
      shell: |
        pcs stonith history clean 2>/dev/null || true
        pcs resource clear vip 2>/dev/null || true
        pcs resource clear postgresql 2>/dev/null || true
      changed_when: false
      failed_when: false

    - name: "{{ ansible_play_name | regex_replace(' Testi.*', '') }} | GUARD | Cluster sağlıklı mı? (her iki node online)"
      shell: pcs status 2>&1
      register: _guard_status
      retries: 36
      delay: 5
      until: >
        'OFFLINE' not in _guard_status.stdout
        and 'partition with quorum' in _guard_status.stdout
      changed_when: false
      failed_when: false

    - name: "{{ ansible_play_name | regex_replace(' Testi.*', '') }} | GUARD | Resource cleanup"
      command: pcs resource cleanup
      changed_when: false
      failed_when: false
      when: >
        'Failed Resource Actions' in _guard_status.stdout or
        'Stopped' in _guard_status.stdout

    - name: "{{ ansible_play_name | regex_replace(' Testi.*', '') }} | GUARD | Cluster durumu doğrulama"
      assert:
        that:
          - "'OFFLINE' not in _guard_status.stdout"
          - "'partition with quorum' in _guard_status.stdout"
        success_msg: "✓ Cluster hazır — her iki node online"
        fail_msg: >-
          ✗ Cluster test için hazır değil! OFFLINE node veya quorum sorunu var.
          Durum: {{ _guard_status.stdout[-500:] }}
      when: not (run_destructive | default(false) | bool) or
            not (ansible_play_name is search('T13'))

    - name: "T13 | Yıkıcı test kontrolü"
      assert:
        that: run_destructive | default(false) | bool
        success_msg: "Devam ediliyor"
        fail_msg: "⏭ T13 ATLANDI — -e run_destructive=true gerekli"
      ignore_errors: yes

    - name: "T13 | Yıkıcı mod kapalıysa atla"
      meta: end_play
      when: not (run_destructive | default(false) | bool)

    - name: "T13 | Test (block/rescue ile güvenli)"
      block:
        - name: "T13 | Cluster tamamen durdur"
          command: pcs cluster stop --all --wait=120
          register: t13_stop
          changed_when: true

        - name: "T13 | Tüm cluster servislerinin durduğunu doğrula"
          command: systemctl is-active corosync
          register: t13_corosync_stopped
          failed_when: t13_corosync_stopped.rc == 0
          changed_when: false
          loop: "{{ groups['cluster_nodes'] }}"
          delegate_to: "{{ item }}"

        - name: "T13 | 10 saniye bekle"
          pause:
            seconds: 10

        - name: "T13 | Cluster tamamen başlat"
          command: pcs cluster start --all --wait=120
          register: t13_start
          changed_when: true

        - name: "T13 | Cluster'ın tam olarak başlamasını bekle"
          command: pcs status
          register: t13_start_wait
          retries: "{{ (restart_wait / 10) | int }}"
          delay: 10
          until: >
            'Online: [ ' in t13_start_wait.stdout and
            'OFFLINE' not in t13_start_wait.stdout and
            'FAILED' not in t13_start_wait.stdout
          changed_when: false

        - name: "T13 | Resource cleanup (stale counter'lar)"
          command: pcs resource cleanup
          changed_when: false

        - name: "T13 | GFS2 her iki node'da başladı mı?"
          shell: pcs resource status gfs2_fs-clone 2>&1
          register: t13_gfs2
          retries: 12
          delay: 10
          until: >
            t13_gfs2.stdout | regex_search('Started:.*' + groups['cluster_nodes'][0].split('.')[0]) and
            t13_gfs2.stdout | regex_search('Started:.*' + groups['cluster_nodes'][1].split('.')[0])
          changed_when: false
          failed_when: false

        - name: "T13 | PostgreSQL başladı mı?"
          command: pcs resource status postgresql
          register: t13_pg
          retries: 12
          delay: 10
          until: "'Started' in t13_pg.stdout"
          changed_when: false

        - name: "T13 | Tam yeniden başlatma sonrası bağlantı testi"
          command: >
            psql -h {{ virtual_ip }} -U postgres -c "SELECT version();"
          environment:
            PGPASSWORD: "{{ pgsql_password }}"
          register: t13_pg_connect
          changed_when: false
          retries: 6
          delay: 5
          until: t13_pg_connect.rc == 0

      rescue:
        - name: "T13 | HATA — cluster başlatmayı dene"
          command: pcs cluster start --all
          failed_when: false

        - name: "T13 | HATA — detay"
          fail:
            msg: "✗ T13 başarısız! Hata: {{ ansible_failed_result.msg | default('bilinmiyor') }}"

      always:
        - name: "T13 | Resource cleanup"
          command: pcs resource cleanup
          changed_when: false
          failed_when: false

    - name: "T13 | SONUÇ"
      debug:
        msg: |
          ✅ T13 BAŞARILI — Tam Cluster Yeniden Başlatma
            Stop  : tüm node'lar durduruldu
            Start : tüm node'lar başlatıldı
            GFS2  : her iki node'da aktif
            pgsql : Started ({{ virtual_ip }} üzerinden erişilebilir)


# =============================================================================
# FINAL: TEST RAPORU VE ORTAM RESTORE
# =============================================================================
- name: "RAPOR | Test Özet Raporu ve Ortam Restore"
  hosts: "{{ groups['cluster_nodes'][0] }}"
  gather_facts: yes
  become: yes
  tags: always

  tasks:
    # ── Kapsamlı Temizlik ────────────────────────────────────────────────────
    - name: "RAPOR | Tüm iptables test kurallarını temizle (güvenlik)"
      shell: |
        iptables -D INPUT  -p udp --dport 5405 -j DROP 2>/dev/null || true
        iptables -D OUTPUT -p udp --dport 5405 -j DROP 2>/dev/null || true
        iptables -D INPUT  -p tcp --dport 5405 -j DROP 2>/dev/null || true
        iptables -D OUTPUT -p tcp --dport 5405 -j DROP 2>/dev/null || true
        iptables -D OUTPUT -p tcp --dport {{ qdevice_port }} -j DROP 2>/dev/null || true
        iptables -D INPUT  -p tcp --dport {{ qdevice_port }} -j DROP 2>/dev/null || true
        iptables -D OUTPUT -p tcp -d {{ iscsi_target_ip }} --dport 3260 -j DROP 2>/dev/null || true
        iptables -D INPUT  -p tcp -s {{ iscsi_target_ip }} --dport 3260 -j DROP 2>/dev/null || true
      changed_when: false
      failed_when: false
      loop: "{{ groups['cluster_nodes'] }}"
      delegate_to: "{{ item }}"

    - name: "RAPOR | Tüm test tablolarını temizle (PostgreSQL)"
      shell: |
        psql -h {{ virtual_ip }} -U postgres -c \
        "DROP TABLE IF EXISTS ha_test_t02, ha_test_t03, ha_test_t06,
         ha_load_t11, ha_test_t12 CASCADE;"
      environment:
        PGPASSWORD: "{{ pgsql_password }}"
      changed_when: false
      failed_when: false

    - name: "RAPOR | GFS2 test dosyalarını temizle"
      shell: "rm -f {{ gfs2_mount }}/ha_test_t07_*.txt"
      changed_when: false
      failed_when: false

    - name: "RAPOR | Tüm location constraint'leri temizle"
      shell: |
        pcs resource clear vip 2>/dev/null || true
        pcs resource clear postgresql 2>/dev/null || true
      changed_when: false
      failed_when: false

    - name: "RAPOR | Fencing geçmişini temizle"
      shell: pcs stonith history clean 2>/dev/null || true
      changed_when: false
      failed_when: false

    - name: "RAPOR | Son resource cleanup"
      command: pcs resource cleanup
      changed_when: false

    - name: "RAPOR | Stabilizasyon bekleme (20s)"
      pause:
        seconds: 20

    # ── Son Durum Kontrolleri ────────────────────────────────────────────────
    - name: "RAPOR | Son cluster durumu"
      command: pcs status
      register: final_status
      changed_when: false

    - name: "RAPOR | Son constraint durumu"
      command: pcs constraint
      register: final_constraints
      changed_when: false

    - name: "RAPOR | Quorum son durumu"
      command: pcs quorum status
      register: final_quorum
      changed_when: false

    - name: "RAPOR | GFS2 mount durumu (her node)"
      shell: |
        echo "=== Node: {{ item }} ==="
        df -h {{ gfs2_mount }} 2>/dev/null || echo "{{ gfs2_mount }} mount edilmemiş"
        mount | grep {{ gfs2_mount }} || echo "{{ gfs2_mount }} mount satırı bulunamadı"
      register: gfs2_final_check
      changed_when: false
      failed_when: false
      loop: "{{ groups['cluster_nodes'] }}"
      delegate_to: "{{ item }}"

    - name: "RAPOR | Her iki node'da mount durumu"
      shell: "df -h {{ gfs2_mount }} {{ pgsql_mount }} 2>/dev/null || true"
      register: final_mounts
      changed_when: false
      loop: "{{ groups['cluster_nodes'] }}"
      delegate_to: "{{ item }}"

    - name: "RAPOR | Son PostgreSQL bağlantı testi"
      command: >
        psql -h {{ virtual_ip }} -U postgres
        -c "SELECT 'cluster OK' AS durum, now() AS zaman, version() AS versiyon;"
      environment:
        PGPASSWORD: "{{ pgsql_password }}"
      register: final_pg_check
      changed_when: false
      failed_when: false

    - name: "RAPOR | Son PostgreSQL durumu"
      debug:
        msg: "{{ final_pg_check.stdout_lines | default(['PostgreSQL erişilemiyor']) }}"

    # ── Özet Rapor ───────────────────────────────────────────────────────────
    - name: "RAPOR | Özet rapor"
      debug:
        msg: |
          ╔══════════════════════════════════════════════════════════════════════╗
          ║                  HA CLUSTER TEST RAPORU                             ║
          ╠══════════════════════════════════════════════════════════════════════╣
          ║  Tarih    : {{ ansible_date_time.date }} {{ ansible_date_time.time }}
          ║  Cluster  : {{ cluster_name }}
          ║  VIP      : {{ virtual_ip }}:{{ pgsql_port }}
