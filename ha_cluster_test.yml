    # ── db_vg (exclusive) hangi node'da aktif? ──────────────────────────────
    # pgsql_lv_activate exclusive modda çalışır; lockspace yalnızca o node'da
    # görünür. Testi o node üzerinde delegate etmek gerekir.
    - name: "T08 | db_vg'nin aktif olduğu node'u belirle (pgsql_lv_activate)"
      shell: "pcs resource status pgsql_lv_activate | grep Started | awk '{print $NF}'"
      register: t08_db_active_raw
      changed_when: false

    - name: "T08 | db_vg aktif node"
      set_fact:
        t08_db_active_node: "{{ t08_db_active_raw.stdout | trim }}"

    - name: "T08 | Node rolleri"
      debug:
        msg: |
          shared_vg (clone — her node): tüm cluster_nodes
          db_vg (exclusive)           : {{ t08_db_active_node }}

    # ── lvmlockd process (her node) ─────────────────────────────────────────
    - name: "T08 | lvmlockd process çalışıyor mu? (her node)"
      command: pgrep -x lvmlockd
      register: t08_lvmlockd_pid
      changed_when: false
      loop: "{{ groups['cluster_nodes'] }}"
      delegate_to: "{{ item }}"

    - name: "T08 | lvmlockd PID (her node)"
      debug:
        msg: "{{ item.item }}: lvmlockd PID={{ item.stdout | trim }}"
      loop: "{{ t08_lvmlockd_pid.results }}"

    # ── shared_vg lockspace — clone VG, her node'da görünmeli ───────────────
    - name: "T08 | lvmlockctl dump — shared_vg kontrolü (her node)"
      command: lvmlockctl --dump
      register: t08_lockctl_shared
      changed_when: false
      failed_when: false
      loop: "{{ groups['cluster_nodes'] }}"
      delegate_to: "{{ item }}"

    - name: "T08 | shared_vg lockspace aktif mi? (her node)"
      assert:
        that: "'shared_vg' in item.stdout"
        success_msg: "✓ shared_vg lockspace aktif — {{ item.item }}"
        fail_msg: "✗ shared_vg lockspace bulunamadı — {{ item.item }}\n{{ item.stdout }}"
      loop: "{{ t08_lockctl_shared.results }}"

    # ── db_vg lockspace — exclusive VG, yalnızca aktif node'da görünür ──────
    - name: "T08 | lvmlockctl dump — db_vg kontrolü ({{ t08_db_active_node }})"
      command: lvmlockctl --dump
      register: t08_lockctl_before
      changed_when: false
      failed_when: false
      delegate_to: "{{ t08_db_active_node }}"

    - name: "T08 | db_vg lockspace aktif mi? ({{ t08_db_active_node }})"
      assert:
        that: "'db_vg' in t08_lockctl_before.stdout"
        success_msg: "✓ db_vg lockspace aktif — {{ t08_db_active_node }}"
        fail_msg: >-
          ✗ db_vg lockspace bulunamadı — {{ t08_db_active_node }}
          (db_vg exclusive moddadır; yalnızca pgsql_lv_activate'in çalıştığı
          node'da lockspace açık olur. pcs resource status pgsql_lv_activate
          ile aktif node'u doğrulayın ve lvmlockctl --dump çıktısını inceleyin.)

    # ── Failcount & lvm.conf ─────────────────────────────────────────────────
    - name: "T08 | lvmlockd resource failcount"
      command: "pcs resource failcount show lvmlockd"
      register: t08_failcount
      changed_when: false
      failed_when: false

    - name: "T08 | use_lvmlockd lvm.conf doğrulama (her node)"
      shell: "grep use_lvmlockd /etc/lvm/lvm.conf | grep -v '^[[:space:]]*#' | head -3"
      register: t08_lvm_conf
      changed_when: false
      failed_when: false
      loop: "{{ groups['cluster_nodes'] }}"
      delegate_to: "{{ item }}"

    - name: "T08 | LVM lock durumu raporu"
      debug:
        msg: |
          db_vg lvmlockctl dump ({{ t08_db_active_node }}):
          {{ t08_lockctl_before.stdout }}

          use_lvmlockd config:
          {% for item in t08_lvm_conf.results %}
          {{ item.item }}: {{ item.stdout | default('(alınamadı)') }}
          {% endfor %}

          Failcount:
          {{ t08_failcount.stdout | default('failcount bilgisi yok') }}

    # ── lock-start idempotency ───────────────────────────────────────────────
    - name: "T08 | shared_vg lock-start idempotency (her node)"
      command: "vgchange --lock-start {{ shared_vg }}"
      register: t08_lockstart_shared
      loop: "{{ groups['cluster_nodes'] }}"
      delegate_to: "{{ item }}"
      changed_when: false
      failed_when: false

    - name: "T08 | shared_vg lock-start sonuçları"
      debug:
        msg: "{{ item.item }}: vgchange --lock-start {{ shared_vg }} rc={{ item.rc }} {{ item.stdout | default('') }}"
      loop: "{{ t08_lockstart_shared.results }}"

    - name: "T08 | db_vg lock-start idempotency ({{ t08_db_active_node }})"
      command: "vgchange --lock-start {{ db_vg }}"
      register: t08_lockstart_db
      delegate_to: "{{ t08_db_active_node }}"
      changed_when: false
      failed_when: false

    - name: "T08 | db_vg lock-start sonucu"
      debug:
        msg: "{{ t08_db_active_node }}: vgchange --lock-start {{ db_vg }} rc={{ t08_lockstart_db.rc }} {{ t08_lockstart_db.stdout | default('') }}"

    # ── VG erişim testi ──────────────────────────────────────────────────────
    - name: "T08 | shared_vg erişim testi (her node)"
      command: "vgs {{ shared_vg }}"
      register: t08_vgs_shared
      loop: "{{ groups['cluster_nodes'] }}"
      delegate_to: "{{ item }}"
      changed_when: false

    - name: "T08 | shared_vg erişim doğrulama"
      assert:
        that: item.rc == 0
        success_msg: "✓ {{ shared_vg }} erişilebilir — {{ item.item }}"
        fail_msg: "✗ {{ shared_vg }} erişilemiyor — {{ item.item }}"
      loop: "{{ t08_vgs_shared.results }}"

    - name: "T08 | db_vg erişim testi ({{ t08_db_active_node }})"
      command: "vgs {{ db_vg }}"
      register: t08_vgs_db
      delegate_to: "{{ t08_db_active_node }}"
      changed_when: false

    - name: "T08 | db_vg erişim doğrulama"
      assert:
        that: t08_vgs_db.rc == 0
        success_msg: "✓ {{ db_vg }} erişilebilir — {{ t08_db_active_node }}"
        fail_msg: "✗ {{ db_vg }} erişilemiyor — {{ t08_db_active_node }}"

    # ── LV aktivasyon durumu ─────────────────────────────────────────────────
    - name: "T08 | LV aktivasyon durumu kontrol (shared_vg, her node)"
      shell: |
        echo "=== shared_vg LV'leri ($(hostname -s)) ==="
        lvs {{ shared_vg }} 2>/dev/null || echo "Erişilemiyor"
      register: t08_lvs_shared
      changed_when: false
      failed_when: false
      loop: "{{ groups['cluster_nodes'] }}"
      delegate_to: "{{ item }}"

    - name: "T08 | db_vg LV aktivasyon durumu ({{ t08_db_active_node }})"
      shell: |
        echo "=== db_vg LV'leri ($(hostname -s)) ==="
        lvs {{ db_vg }} 2>/dev/null || echo "Erişilemiyor"
      register: t08_lvs_db
      changed_when: false
      failed_when: false
      delegate_to: "{{ t08_db_active_node }}"

    - name: "T08 | LV durumu"
      debug:
        msg: |
          {% for item in t08_lvs_shared.results %}
          {{ item.stdout_lines | join('\n') }}
          {% endfor %}
          {{ t08_lvs_db.stdout_lines | join('\n') }}

    - name: "T08 | SONUÇ"
      debug:
        msg: |
          ✅ T08 BAŞARILI — LVM Lock Doğrulama
            shared_vg lockspace : aktif (her iki node)
            db_vg lockspace     : aktif ({{ t08_db_active_node }} — exclusive)
            lock-start idempotency: doğrulandı
            LV erişimi          : doğrulandı


# =============================================================================
# T09: STONITH FENCE AGENT TESTİ
# =============================================================================
- name: "T09 | STONITH Fence Agent Testi"
  hosts: "{{ groups['cluster_nodes'][0] }}"
  gather_facts: no
  become: yes
  tags: test_T09
  vars:
    node_boot_wait: 180

  tasks:
    - name: "T09 | Banner"
      debug:
        msg: "════════ T09: STONITH FENCE AGENT TESTİ ════════"


    # ── Pre-test cluster guard ────────────────────────────────────────────────
    # Her testten önce cluster'ın iki node'da da sağlıklı olduğunu doğrular.
    # Önceki testten kalan fence aksiyonları / OFFLINE node varsa bekler.
    - name: "{{ ansible_play_name | regex_replace(' Testi.*', '') }} | GUARD | Fencing geçmişi ve constraint temizliği"
      shell: |
        pcs stonith history clean 2>/dev/null || true
        pcs resource clear vip 2>/dev/null || true
        pcs resource clear postgresql 2>/dev/null || true
      changed_when: false
      failed_when: false

    - name: "{{ ansible_play_name | regex_replace(' Testi.*', '') }} | GUARD | Cluster sağlıklı mı? (her iki node online)"
      shell: pcs status 2>&1
      register: _guard_status
      retries: 36
      delay: 5
      until: >
        'OFFLINE' not in _guard_status.stdout
        and 'partition with quorum' in _guard_status.stdout
      changed_when: false
      failed_when: false

    - name: "{{ ansible_play_name | regex_replace(' Testi.*', '') }} | GUARD | Resource cleanup"
      command: pcs resource cleanup
      changed_when: false
      failed_when: false
      when: >
        'Failed Resource Actions' in _guard_status.stdout or
        'Stopped' in _guard_status.stdout

    - name: "{{ ansible_play_name | regex_replace(' Testi.*', '') }} | GUARD | Cluster durumu doğrulama"
      assert:
        that:
          - "'OFFLINE' not in _guard_status.stdout"
          - "'partition with quorum' in _guard_status.stdout"
        success_msg: "✓ Cluster hazır — her iki node online"
        fail_msg: >-
          ✗ Cluster test için hazır değil! OFFLINE node veya quorum sorunu var.
          Durum: {{ _guard_status.stdout[-500:] }}
      when: not (run_destructive | default(false) | bool) or
            not (ansible_play_name is search('T13'))

    - name: "T09 | STONITH test kontrolü"
      assert:
        that: run_stonith_test | default(false) | bool
        success_msg: "STONITH testi modu etkin"
        fail_msg: "⏭ T09 ATLANDI — -e run_stonith_test=true gerekli (node REBOOT olur!)"
      ignore_errors: yes
      register: stonith_check

    - name: "T09 | STONITH mod kapalıysa atla"
      meta: end_play
      when: not (run_stonith_test | default(false) | bool)

    - name: "T09 | Pasif node'u belirle (fence edilecek)"
      shell: "pcs resource status vip | grep Started | awk '{print $NF}'"
      register: t09_active_raw
      changed_when: false

    - name: "T09 | Fence edilecek node: pasif node"
      set_fact:
        t09_fence_target: >-
          {{ groups['cluster_nodes'] |
             reject('equalto', t09_active_raw.stdout | trim) |
             list | first }}
        t09_active: "{{ t09_active_raw.stdout | trim }}"

    - name: "T09 | Test (block/rescue ile güvenli)"
      block:
        # ── IPMI erişim ön testi ───────────────────────────────────────────
        - name: "T09 | Fence agent status testi (IPMI ping)"
          command: >
            ipmitool -I lanplus
            -H {{ hostvars[t09_fence_target].ipmi_ip }}
            -p {{ hostvars[t09_fence_target].ipmi_port }}
            -U {{ hostvars[t09_fence_target].ipmi_user }}
            -P {{ hostvars[t09_fence_target].ipmi_password }}
            chassis power status
          register: t09_ipmi_status
          changed_when: false
          no_log: true

        - name: "T09 | IPMI erişilebilirlik"
          assert:
            that: t09_ipmi_status.rc == 0
            success_msg: "✓ IPMI erişilebilir: {{ t09_ipmi_status.stdout | trim }}"
            fail_msg: "✗ IPMI erişilemiyor — hosts.yml → ipmi_ip/ipmi_port/ipmi_user/ipmi_password kontrol edin!"

        # ── Fence komutunu AKTIF node üzerinden async gönder ──────────────
        # NEDEN async:
        #   pcs stonith fence senkron çalışır ve fence tamamlanana kadar
        #   bloklar. Fence edilen node kapandığında SSH düşer ve Ansible
        #   sonsuza askıda kalır. async ile SSH bağımsız devam edilir.
        #
        # NEDEN --reboot (--off değil):
        #   fence_ipmilan meta pcmk_reboot_action=reboot ile tanımlanmıştır.
        #   --reboot node'u kapatıp otomatik açar; --off sadece kapatır ve
        #   node elle açılmak zorunda kalır.
        #
        # NEDEN delegate_to t09_active:
        #   Fence komutunu fence edilecek node DEĞİL, hayatta kalacak
        #   node çalıştırmalı. Aksi hâlde SSH düşer, Ansible askıda kalır.
        - name: "T09 | Pasif node'u fence et (async, aktif node'dan): {{ t09_fence_target }}"
          command: "pcs stonith fence {{ t09_fence_target }} --reboot"
          async: 120
          poll: 0
          register: t09_fence_job
          changed_when: true
          delegate_to: "{{ t09_active }}"

        - name: "T09 | Fence işleminin tamamlanmasını bekle (async_status)"
          async_status:
            jid: "{{ t09_fence_job.ansible_job_id }}"
          register: t09_fence_result
          retries: 24
          delay: 5
          until: t09_fence_result.finished
          delegate_to: "{{ t09_active }}"
          failed_when: false

        - name: "T09 | Fence sonucu"
          debug:
            msg: |
              fence rc     : {{ t09_fence_result.rc | default('N/A') }}
              fence stdout : {{ t09_fence_result.stdout | default('') | trim }}
              fence stderr : {{ t09_fence_result.stderr | default('') | trim }}

        # ── Fence teyidi ──────────────────────────────────────────────────
        # NOT: --reboot ile hızlı ortamlarda (VM, IPMI simülatör) node
        # OFFLINE penceresine girmeden geri dönebilir. Bu nedenle
        # "OFFLINE görünmesini bekleme" adımı kaldırıldı; bunun yerine
        # fence komutunun başarıyla tamamlandığı (async_status.finished)
        # zaten doğrulandı. Burada sadece kısa bir stabilizasyon beklemesi
        # ve ardından cluster sağlık kontrolü yapılır.
        - name: "T09 | Fence sonrası stabilizasyon bekleme (15s)"
          pause:
            seconds: 15

        - name: "T09 | Fence sonrası cluster durumu snapshot"
          command: pcs status
          register: t09_post_fence
          changed_when: false
          failed_when: false
          delegate_to: "{{ t09_active }}"

        - name: "T09 | Fence sonrası cluster durumu çıktısı"
          debug:
            msg: "{{ t09_post_fence.stdout_lines }}"

        # ── --reboot: node otomatik açılır; SSH erişimini bekle ───────────
        - name: "T09 | Node'un boot etmesini bekle — SSH portu açık mı? ({{ node_boot_wait }}s)"
          wait_for:
            host: "{{ hostvars[t09_fence_target].ansible_host }}"
            port: 22
            delay: 15
            timeout: "{{ node_boot_wait }}"
            state: started

        - name: "T09 | Cluster servislerini başlat (boot sonrası otomatik başlamamışsa)"
          command: pcs cluster start
          delegate_to: "{{ t09_fence_target }}"
          failed_when: false

        - name: "T09 | Node'un cluster'a döndüğünü doğrula"
          command: pcs status
          register: t09_recovery
          retries: 24
          delay: 10
          until: >
            'OFFLINE' not in t09_recovery.stdout and
            t09_fence_target.split('.')[0] in t09_recovery.stdout and
            'partition with quorum' in t09_recovery.stdout
          changed_when: false
          delegate_to: "{{ t09_active }}"

        - name: "T09 | Kurtarma doğrulama"
          assert:
            that:
              - "'OFFLINE' not in t09_recovery.stdout"
              - "t09_fence_target.split('.')[0] in t09_recovery.stdout"
              - "'partition with quorum' in t09_recovery.stdout"
            success_msg: "✓ {{ t09_fence_target }} cluster'a döndü — quorum tam"
            fail_msg: "✗ {{ t09_fence_target }} cluster'a dönmedi!\n{{ t09_recovery.stdout }}"

      rescue:
        - name: "T09 | RESCUE | IPMI ile node'u açmayı dene (--reboot başarısız olduysa)"
          command: >
            ipmitool -I lanplus
            -H {{ hostvars[t09_fence_target].ipmi_ip }}
            -p {{ hostvars[t09_fence_target].ipmi_port }}
            -U {{ hostvars[t09_fence_target].ipmi_user }}
            -P {{ hostvars[t09_fence_target].ipmi_password }}
            chassis power on
          failed_when: false
          no_log: true
          delegate_to: "{{ t09_active }}"

        - name: "T09 | RESCUE | Hata detayı"
          fail:
            msg: "✗ T09 başarısız! Hata: {{ ansible_failed_result.msg | default('bilinmiyor') }}"

      always:
        - name: "T09 | Resource cleanup (her durumda)"
          command: pcs resource cleanup
          changed_when: false
          failed_when: false
          delegate_to: "{{ t09_active }}"

        - name: "T09 | Fencing geçmişini temizle (sonraki testleri korumak için)"
          shell: pcs stonith history clean 2>/dev/null || true
          changed_when: false
          failed_when: false
          delegate_to: "{{ t09_active }}"

    - name: "T09 | SONUÇ"
      debug:
        msg: |
          ✅ T09 BAŞARILI — STONITH Fence Agent
            Fence target  : {{ t09_fence_target }}
            Fence method  : pcs stonith fence --reboot (async, aktif node'dan)
            Kurtarma      : IPMI reboot → otomatik boot → cluster rejoin


# =============================================================================
# T10: iSCSI BAĞLANTI KESİNTİSİ
# =============================================================================
- name: "T10 | iSCSI Bağlantı Kesintisi Testi"
  hosts: "{{ groups['cluster_nodes'][0] }}"
  gather_facts: no
  become: yes
  tags: test_T10
  vars:
    iscsi_block_duration: 30

  tasks:
    - name: "T10 | Banner"
      debug:
        msg: "════════ T10: iSCSI BAĞLANTI KESİNTİSİ ════════"


    # ── Pre-test cluster guard ────────────────────────────────────────────────
    # Her testten önce cluster'ın iki node'da da sağlıklı olduğunu doğrular.
    # Önceki testten kalan fence aksiyonları / OFFLINE node varsa bekler.
    - name: "{{ ansible_play_name | regex_replace(' Testi.*', '') }} | GUARD | Fencing geçmişi ve constraint temizliği"
      shell: |
        pcs stonith history clean 2>/dev/null || true
        pcs resource clear vip 2>/dev/null || true
        pcs resource clear postgresql 2>/dev/null || true
      changed_when: false
      failed_when: false

    - name: "{{ ansible_play_name | regex_replace(' Testi.*', '') }} | GUARD | Cluster sağlıklı mı? (her iki node online)"
      shell: pcs status 2>&1
      register: _guard_status
      retries: 36
      delay: 5
      until: >
        'OFFLINE' not in _guard_status.stdout
        and 'partition with quorum' in _guard_status.stdout
      changed_when: false
      failed_when: false

    - name: "{{ ansible_play_name | regex_replace(' Testi.*', '') }} | GUARD | Resource cleanup"
      command: pcs resource cleanup
      changed_when: false
      failed_when: false
      when: >
        'Failed Resource Actions' in _guard_status.stdout or
        'Stopped' in _guard_status.stdout

    - name: "{{ ansible_play_name | regex_replace(' Testi.*', '') }} | GUARD | Cluster durumu doğrulama"
      assert:
        that:
          - "'OFFLINE' not in _guard_status.stdout"
          - "'partition with quorum' in _guard_status.stdout"
        success_msg: "✓ Cluster hazır — her iki node online"
        fail_msg: >-
          ✗ Cluster test için hazır değil! OFFLINE node veya quorum sorunu var.
          Durum: {{ _guard_status.stdout[-500:] }}
      when: not (run_destructive | default(false) | bool) or
            not (ansible_play_name is search('T13'))

    - name: "T10 | iSCSI yapılandırma kontrolü"
      assert:
        that: configure_iscsi | default(true) | bool
        success_msg: "✓ configure_iscsi=true — devam ediliyor"
        fail_msg: "⏭ T10 ATLANDI — configure_iscsi=false, iSCSI kurulmadı"
      ignore_errors: yes

    - name: "T10 | iSCSI kullanılmıyorsa atla"
      meta: end_play
      when: not (configure_iscsi | default(true) | bool)

    - name: "T10 | Yıkıcı test kontrolü"
      assert:
        that: run_destructive | default(false) | bool
        success_msg: "Devam ediliyor"
        fail_msg: "⏭ T10 ATLANDI — -e run_destructive=true gerekli"
      ignore_errors: yes

    - name: "T10 | Yıkıcı mod kapalıysa atla"
      meta: end_play
      when: not (run_destructive | default(false) | bool)

    - name: "T10 | iSCSI target bağlantı durumu"
      command: iscsiadm -m session
      register: t10_iscsi_sessions
      changed_when: false
      failed_when: false

    - name: "T10 | Aktif iSCSI session'ları"
      debug:
        msg: "{{ t10_iscsi_sessions.stdout_lines }}"


    - name: "T10 | Multipath durumu (kesinti öncesi)"
      command: multipath -ll
      register: t10_mpath_before
      changed_when: false
      failed_when: false

    - name: "T10 | Test (block/rescue ile güvenli)"
      block:
        - name: "T10 | iSCSI target portunu kes ({{ iscsi_block_duration }}s)"
          shell: |
            iptables -I OUTPUT -p tcp -d {{ iscsi_target_ip }} --dport 3260 -j DROP
            iptables -I INPUT  -p tcp -s {{ iscsi_target_ip }} --dport 3260 -j DROP
            echo "iSCSI blocked at $(date)"
            sleep {{ iscsi_block_duration }}
            iptables -D OUTPUT -p tcp -d {{ iscsi_target_ip }} --dport 3260 -j DROP 2>/dev/null || true
            iptables -D INPUT  -p tcp -s {{ iscsi_target_ip }} --dport 3260 -j DROP 2>/dev/null || true
            echo "iSCSI restored at $(date)"
          async: "{{ iscsi_block_duration + 30 }}"
          poll: 0
          loop: "{{ groups['cluster_nodes'] }}"
          delegate_to: "{{ item }}"

        - name: "T10 | iSCSI kesintisi sırasında cluster davranışı izle"
          command: pcs status
          register: t10_status
          retries: 6
          delay: 5
          changed_when: false
          failed_when: false

        - name: "T10 | Kesinti sırasındaki cluster durumu"
          debug:
            msg: "{{ t10_status.stdout_lines }}"

        - name: "T10 | iSCSI kurtarmasını bekle"
          pause:
            seconds: "{{ iscsi_block_duration + 15 }}"

        - name: "T10 | Resource cleanup"
          command: pcs resource cleanup
          changed_when: false

        - name: "T10 | iSCSI kurtarma sonrası cluster stabilizasyonu"
          command: pcs status
          register: t10_recovery
          retries: 24
          delay: 5
          until: "'Failed Resource Actions' not in t10_recovery.stdout"
          changed_when: false
          failed_when: false

        - name: "T10 | GFS2 mount kurtarma doğrulama (her node)"
          command: mountpoint -q {{ gfs2_mount }}
          register: t10_gfs2_check
          loop: "{{ groups['cluster_nodes'] }}"
          delegate_to: "{{ item }}"
          changed_when: false
          failed_when: false

        - name: "T10 | GFS2 mount durumu"
          debug:
            msg: "{{ item.item }}: GFS2 mount {{ 'OK' if item.rc == 0 else 'FAILED' }}"
          loop: "{{ t10_gfs2_check.results }}"

        - name: "T10 | Multipath durumu (kurtarma sonrası)"
          command: multipath -ll
          register: t10_mpath_after
          changed_when: false
          failed_when: false

        - name: "T10 | Multipath kurtarma sonucu"
          debug:
            msg: "{{ t10_mpath_after.stdout_lines }}"

      rescue:
        - name: "T10 | HATA — iptables temizle"
          shell: |
            iptables -D OUTPUT -p tcp -d {{ iscsi_target_ip }} --dport 3260 -j DROP 2>/dev/null || true
            iptables -D INPUT  -p tcp -s {{ iscsi_target_ip }} --dport 3260 -j DROP 2>/dev/null || true
          changed_when: false
          failed_when: false
          loop: "{{ groups['cluster_nodes'] }}"
          delegate_to: "{{ item }}"

        - name: "T10 | HATA — detay"
          fail:
            msg: "✗ T10 başarısız! Hata: {{ ansible_failed_result.msg | default('bilinmiyor') }}"

      always:
        - name: "T10 | Iptables temizleme (güvenlik)"
          shell: |
            iptables -D OUTPUT -p tcp -d {{ iscsi_target_ip }} --dport 3260 -j DROP 2>/dev/null || true
            iptables -D INPUT  -p tcp -s {{ iscsi_target_ip }} --dport 3260 -j DROP 2>/dev/null || true
          changed_when: false
          failed_when: false
          loop: "{{ groups['cluster_nodes'] }}"
          delegate_to: "{{ item }}"

    - name: "T10 | SONUÇ"
      debug:
        msg: |
          ✅ T10 TAMAMLANDI — iSCSI Bağlantı Kesintisi
            Kesinti süresi: {{ iscsi_block_duration }}s
            Kurtarma: cluster resource cleanup → reconnect


# =============================================================================
# T11: YÜK ALTINDA FAILOVER (Resource Limits)
# =============================================================================
- name: "T11 | Yük Altında Failover Testi"
  hosts: "{{ groups['cluster_nodes'][0] }}"
  gather_facts: no
  become: yes
  tags: test_T11
  vars:
    pg_load_duration: 30
    failover_wait: 120     # iSCSI recovery için artırıldı (eski: 90)
    blocked_wait: 60       # BLOCKED durumu sonrası recovery için bekleme

  tasks:
    - name: "T11 | Banner"
      debug:
        msg: "════════ T11: YÜK ALTINDA FAILOVER ════════"


    # ── Pre-test cluster guard ────────────────────────────────────────────────
    # Her testten önce cluster'ın iki node'da da sağlıklı olduğunu doğrular.
    # Önceki testten kalan fence aksiyonları / OFFLINE node varsa bekler.
    - name: "{{ ansible_play_name | regex_replace(' Testi.*', '') }} | GUARD | Fencing geçmişi ve constraint temizliği"
      shell: |
        pcs stonith history clean 2>/dev/null || true
        pcs resource clear vip 2>/dev/null || true
        pcs resource clear postgresql 2>/dev/null || true
      changed_when: false
      failed_when: false

    - name: "{{ ansible_play_name | regex_replace(' Testi.*', '') }} | GUARD | Cluster sağlıklı mı? (her iki node online)"
      shell: pcs status 2>&1
      register: _guard_status
      retries: 36
      delay: 5
      until: >
        'OFFLINE' not in _guard_status.stdout
        and 'partition with quorum' in _guard_status.stdout
      changed_when: false
      failed_when: false

    - name: "{{ ansible_play_name | regex_replace(' Testi.*', '') }} | GUARD | Resource cleanup"
      command: pcs resource cleanup
      changed_when: false
      failed_when: false
      when: >
        'Failed Resource Actions' in _guard_status.stdout or
        'Stopped' in _guard_status.stdout

    - name: "{{ ansible_play_name | regex_replace(' Testi.*', '') }} | GUARD | Cluster durumu doğrulama"
      assert:
        that:
          - "'OFFLINE' not in _guard_status.stdout"
          - "'partition with quorum' in _guard_status.stdout"
        success_msg: "✓ Cluster hazır — her iki node online"
        fail_msg: >-
          ✗ Cluster test için hazır değil! OFFLINE node veya quorum sorunu var.
          Durum: {{ _guard_status.stdout[-500:] }}
      when: not (run_destructive | default(false) | bool) or
            not (ansible_play_name is search('T13'))

    - name: "T11 | Test (block/rescue ile güvenli)"
      block:
        - name: "T11 | PostgreSQL yük üretimi başlat (arka planda)"
          shell: |
            psql -h {{ virtual_ip }} -U postgres << 'EOF'
            CREATE TABLE IF NOT EXISTS ha_load_t11 (
              id bigserial PRIMARY KEY,
              data text,
              ts timestamptz DEFAULT now()
            );
            EOF
            for i in $(seq 1 1000); do
              psql -h {{ virtual_ip }} -U postgres -c \
                "INSERT INTO ha_load_t11 (data) VALUES (repeat('x', 1000));" \
                >/dev/null 2>&1 || break
              sleep 0.03
            done
            echo "Yük üretimi tamamlandı"
          environment:
            PGPASSWORD: "{{ pgsql_password }}"
          async: "{{ pg_load_duration + 60 }}"
          poll: 0
          register: t11_load_job

        - name: "T11 | Yük başladı — 10s bekle"
          pause:
            seconds: 10

        - name: "T11 | Aktif node'u belirle"
          shell: "pcs resource status vip | grep Started | awk '{print $NF}'"
          register: t11_active_raw
          changed_when: false

        - name: "T11 | Hedef node'u belirle"
          set_fact:
            t11_active: "{{ t11_active_raw.stdout | trim }}"
            t11_target: >-
              {{ groups['cluster_nodes'] |
                 reject('equalto', t11_active_raw.stdout | trim) |
                 list | first }}

        - name: "T11 | Yük altında VIP failover (postgresql → {{ t11_target }})"
          # postgresql taşınır; colocation zinciri (pgsql_fs→pgsql_lv_activate→vip)
          # gereği diğer resource'lar da peşinden gelir.
          command: "pcs resource move postgresql {{ t11_target }}"
          register: t11_move_result
          changed_when: true

        - name: "T11 | Failover tamamlanmasını bekle"
          command: pcs resource status postgresql
          register: t11_failover_wait
          retries: "{{ (failover_wait / 5) | int }}"
          delay: 5
          until: >
            'Started' in t11_failover_wait.stdout and
            'FAILED' not in t11_failover_wait.stdout and
            'blocked' not in t11_failover_wait.stdout | lower
          changed_when: false
          # on-fail=fence: stop fail → node otomatik reboot → postgresql diğer node'da başlar
          # BLOCKED beklenmez; reboot süresi (~60s) için failover_wait=120s

        - name: "T11 | Yük sonrası bağlantı testi"
          shell: |
            psql -h {{ virtual_ip }} -U postgres -c \
            "SELECT count(*) FROM ha_load_t11;"
          environment:
            PGPASSWORD: "{{ pgsql_password }}"
          register: t11_count
          changed_when: false
          retries: 6
          delay: 5
          until: t11_count.rc == 0

        - name: "T11 | Yazılan kayıt sayısı"
          debug:
            msg: "Yük altında yazılan kayıt sayısı: {{ t11_count.stdout }}"

      rescue:
        - name: "T11 | RESCUE | Cluster durumu"
          command: pcs status
          register: t11_rescue_status
          changed_when: false
          failed_when: false

        - name: "T11 | RESCUE | postgresql location constraint kaldır"
          command: pcs resource clear postgresql
          changed_when: false
          failed_when: false

        - name: "T11 | RESCUE | Fencing geçmişini temizle"
          shell: pcs stonith history clean 2>/dev/null || true
          changed_when: false
          failed_when: false

        - name: "T11 | RESCUE | Resource cleanup"
          command: pcs resource cleanup
          changed_when: false
          failed_when: false

        - name: "T11 | RESCUE | Durum analizi"
          debug:
            msg: |
              ════════════════════════════════════════
              T11 RESCUE — Hata Analizi
              ════════════════════════════════════════
              {{ t11_rescue_status.stdout }}

              Olası nedenler:
              1. Failover timeout — postgresql yeni node'a taşınamadı
                 → pcs resource cleanup postgresql
                 → failover_wait değerini artırın (şu an: {{ failover_wait }}s)

              2. BLOCKED kaldıysa (on-fail=fence çalışmadı):
                 → pcs resource op update postgresql stop on-fail=fence
                 → pcs resource op update pgsql_fs stop on-fail=fence
                 → pcs resource cleanup postgresql pgsql_fs pgsql_lv_activate

              3. iSCSI/storage sorunu:
                 → multipath -ll (path durumu)
                 → dmesg | grep -E "iSCSI|XFS|multipath"

        - name: "T11 | RESCUE | Hata"
          fail:
            msg: "✗ T11 başarısız — pcs status çıktısına bakın"

      always:
        - name: "T11 | Location constraint kaldır (postgresql)"
          command: pcs resource clear postgresql
          changed_when: false
          failed_when: false

        - name: "T11 | Fencing geçmişini temizle (always)"
          shell: pcs stonith history clean 2>/dev/null || true
          changed_when: false
          failed_when: false

        - name: "T11 | Temizlik — test tablosu"
          shell: "psql -h {{ virtual_ip }} -U postgres -c 'DROP TABLE IF EXISTS ha_load_t11;'"
          environment:
            PGPASSWORD: "{{ pgsql_password }}"
          changed_when: false
          failed_when: false

        - name: "T11 | Son cluster durumu"
          command: pcs status
          register: t11_final_status
          changed_when: false
          failed_when: false

        - name: "T11 | Son durum"
          debug:
            msg: "{{ t11_final_status.stdout_lines }}"

    - name: "T11 | SONUÇ"
      debug:
        msg: |
          ✅ T11 TAMAMLANDI — Yük Altında Failover
            Yük üretimi : 1000 INSERT işlemi
            VIP failover: başarılı
            Kayıtlar    : {{ t11_count.stdout | default('(tablo temizlendi)') | trim }}
            Not: on-fail=fence ile stop hatası → otomatik node reboot → recovery


