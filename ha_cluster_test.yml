- name: "T14 | Web Servisi Testi (Nginx + PHP-FPM)"
  hosts: "{{ groups['cluster_nodes'][0] }}"
  gather_facts: yes
  become: yes
  tags: test_T14

  tasks:
    - name: "T14 | Banner"
      debug:
        msg: "════════ T14: WEB SERVİSİ TESTİ (NGINX + PHP-FPM) ════════"


    # ── Pre-test cluster guard ────────────────────────────────────────────────
    # Her testten önce cluster'ın iki node'da da sağlıklı olduğunu doğrular.
    # Önceki testten kalan fence aksiyonları / OFFLINE node varsa bekler.
    - name: "{{ ansible_play_name | regex_replace(' Testi.*', '') }} | GUARD | Fencing geçmişi ve constraint temizliği"
      shell: |
        pcs stonith history clean 2>/dev/null || true
        pcs resource clear vip 2>/dev/null || true
        pcs resource clear postgresql 2>/dev/null || true
      changed_when: false
      failed_when: false

    - name: "{{ ansible_play_name | regex_replace(' Testi.*', '') }} | GUARD | Cluster sağlıklı mı? (her iki node online)"
      shell: pcs status 2>&1
      register: _guard_status
      retries: 36
      delay: 5
      until: >
        'OFFLINE' not in _guard_status.stdout
        and 'partition with quorum' in _guard_status.stdout
      changed_when: false
      failed_when: false

    - name: "{{ ansible_play_name | regex_replace(' Testi.*', '') }} | GUARD | Resource cleanup"
      command: pcs resource cleanup
      changed_when: false
      failed_when: false
      when: >
        'Failed Resource Actions' in _guard_status.stdout or
        'Stopped' in _guard_status.stdout

    - name: "{{ ansible_play_name | regex_replace(' Testi.*', '') }} | GUARD | Cluster durumu doğrulama"
      assert:
        that:
          - "'OFFLINE' not in _guard_status.stdout"
          - "'partition with quorum' in _guard_status.stdout"
        success_msg: "✓ Cluster hazır — her iki node online"
        fail_msg: >-
          ✗ Cluster test için hazır değil! OFFLINE node veya quorum sorunu var.
          Durum: {{ _guard_status.stdout[-500:] }}
      when: not (run_destructive | default(false) | bool) or
            not (ansible_play_name is search('T13'))

    # =========================================================================
    # T14.1 — ÖN KOŞUL KONTROLLERI
    # =========================================================================
    - name: "T14.1 | nginx binary mevcut mu (/usr/sbin/nginx)"
      command: /usr/sbin/nginx -v
      register: t14_nginx_bin
      changed_when: false
      failed_when: false
      delegate_to: "{{ item }}"
      loop: "{{ groups['cluster_nodes'] }}"

    - name: "T14.1 | nginx binary durumu"
      debug:
        msg: "{{ item.item }}: nginx binary → {{ '✓ MEVCUT (' + item.stderr + ')' if item.rc == 0 else '✗ EKSİK — dnf install nginx -y' }}"
      loop: "{{ t14_nginx_bin.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: "T14.1 | nginx resource httpd=/usr/sbin/nginx parametresi"
      shell: pcs resource config nginx 2>/dev/null | grep -c 'httpd=/usr/sbin/nginx'
      register: t14_nginx_httpd_param
      changed_when: false
      failed_when: false

    - name: "T14.1 | nginx httpd parametresi doğrulama"
      assert:
        that: t14_nginx_httpd_param.stdout | trim | int > 0
        success_msg: "✓ nginx resource httpd=/usr/sbin/nginx parametresi SET"
        fail_msg: |
          ✗ nginx resource httpd=/usr/sbin/nginx EKSİK!
          Bu olmadan Pacemaker 'not installed' hatası verir.
          Düzeltmek için: pcs resource update nginx httpd=/usr/sbin/nginx
      failed_when: false

    - name: "T14.1 | php-pgsql paketi kurulu mu (her node)"
      command: rpm -q php-pgsql
      register: t14_php_pgsql_pkg
      changed_when: false
      failed_when: false
      delegate_to: "{{ item }}"
      loop: "{{ groups['cluster_nodes'] }}"

    - name: "T14.1 | php-pgsql paket durumu"
      debug:
        msg: "{{ item.item }}: php-pgsql → {{ '✓ ' + item.stdout if item.rc == 0 else '✗ EKSİK — dnf install php-pgsql -y && pcs resource cleanup php-fpm-clone' }}"
      loop: "{{ t14_php_pgsql_pkg.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: "T14.1 | php-pgsql PHP modülü yüklü mü (her node)"
      shell: php -m 2>/dev/null | grep -i pgsql
      register: t14_php_pgsql_mod
      changed_when: false
      failed_when: false
      delegate_to: "{{ item }}"
      loop: "{{ groups['cluster_nodes'] }}"

    - name: "T14.1 | php-pgsql modül durumu"
      debug:
        msg: "{{ item.item }}: php -m | pgsql → {{ '✓ ' + item.stdout if item.rc == 0 else '✗ Modül yüklü değil (php-fpm restart gerekebilir)' }}"
      loop: "{{ t14_php_pgsql_mod.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: "T14.1 | nginx servis maskeli değil mi (her node)"
      shell: systemctl is-enabled nginx 2>/dev/null; systemctl status nginx 2>/dev/null | grep -i masked || echo "not_masked"
      register: t14_nginx_mask
      changed_when: false
      failed_when: false
      delegate_to: "{{ item }}"
      loop: "{{ groups['cluster_nodes'] }}"

    - name: "T14.1 | php-fpm servis maskeli değil mi (her node)"
      shell: systemctl status php-fpm 2>/dev/null | grep -i masked && echo "IS_MASKED" || echo "not_masked"
      register: t14_phpfpm_mask
      changed_when: false
      failed_when: false
      delegate_to: "{{ item }}"
      loop: "{{ groups['cluster_nodes'] }}"

    - name: "T14.1 | Servis maske durumları"
      debug:
        msg: |
          {{ item.item }}:
            nginx   mask: {{ 'MASKED ✗ — systemctl unmask nginx && pcs resource cleanup nginx-clone' if 'IS_MASKED' in item.stdout else 'OK ✓' }}
      loop: "{{ t14_phpfpm_mask.results }}"
      loop_control:
        label: "{{ item.item }}"

    # =========================================================================
    # T14.2 — CLUSTER KAYNAK DURUMLARI
    # =========================================================================
    - name: "T14.2 | php-fpm-clone kaynak durumu"
      command: pcs resource status php-fpm-clone
      register: t14_phpfpm_status
      changed_when: false
      failed_when: false

    - name: "T14.2 | nginx-clone kaynak durumu"
      command: pcs resource status nginx-clone
      register: t14_nginx_status
      changed_when: false
      failed_when: false

    - name: "T14.2 | Kaynak durumları"
      debug:
        msg: |
          php-fpm-clone: {{ t14_phpfpm_status.stdout_lines | default(['(boş)']) }}
          nginx-clone  : {{ t14_nginx_status.stdout_lines | default(['(boş)']) }}

    - name: "T14.2 | php-fpm-clone her iki node'da Started olmalı"
      assert:
        that:
          - t14_phpfpm_status.stdout | regex_search('Started.*' + groups['cluster_nodes'][0].split('.')[0])
          - t14_phpfpm_status.stdout | regex_search('Started.*' + groups['cluster_nodes'][1].split('.')[0])
        success_msg: "✓ php-fpm-clone her iki node'da Started"
        fail_msg: |
          ✗ php-fpm-clone başlamadı!
          Kontrol: pcs resource cleanup php-fpm-clone
          Sorun: systemctl unmask php-fpm && pcs resource cleanup php-fpm-clone

    - name: "T14.2 | nginx-clone her iki node'da Started olmalı"
      assert:
        that:
          - t14_nginx_status.stdout | regex_search('Started.*' + groups['cluster_nodes'][0].split('.')[0])
          - t14_nginx_status.stdout | regex_search('Started.*' + groups['cluster_nodes'][1].split('.')[0])
        success_msg: "✓ nginx-clone her iki node'da Started"
        fail_msg: |
          ✗ nginx-clone başlamadı!
          Sık karşılaşılan sorunlar:
          1. httpd parametresi eksik: pcs resource update nginx httpd=/usr/sbin/nginx
          2. Servis maskeli  : systemctl unmask nginx
          Ardından: pcs resource cleanup nginx-clone

    # =========================================================================
    # T14.3 — ORDER CONSTRAINT DOĞRULAMA
    # =========================================================================
    - name: "T14.3 | Tüm constraint'ler"
      command: pcs constraint show --full
      register: t14_constraints
      changed_when: false
      failed_when: false

    - name: "T14.3 | Web servisi order constraint'leri"
      assert:
        that:
          - "'order-gfs2fs-phpfpm' in t14_constraints.stdout"
          - "'order-phpfpm-nginx' in t14_constraints.stdout"
          - "'order-postgresql-phpfpm' in t14_constraints.stdout"
        success_msg: "✓ Tüm web servisi order constraint'leri mevcut"
        fail_msg: |
          ✗ Eksik constraint'ler var!
            order-gfs2fs-phpfpm     : {{ '✓' if 'order-gfs2fs-phpfpm' in t14_constraints.stdout else '✗ EKSİK' }}
            order-phpfpm-nginx      : {{ '✓' if 'order-phpfpm-nginx' in t14_constraints.stdout else '✗ EKSİK' }}
            order-postgresql-phpfpm : {{ '✓' if 'order-postgresql-phpfpm' in t14_constraints.stdout else '✗ EKSİK' }}
          Eklemek için:
            pcs constraint order start gfs2_fs-clone then php-fpm-clone id=order-gfs2fs-phpfpm
            pcs constraint order start postgresql then php-fpm-clone id=order-postgresql-phpfpm
            pcs constraint order start php-fpm-clone then nginx-clone id=order-phpfpm-nginx
      failed_when: false

    # =========================================================================
    # T14.4 — PROCESS KONTROLLERI (Her Node)
    # =========================================================================
    - name: "T14.4 | Her node'da nginx process kontrolü"
      command: pgrep -a nginx
      register: t14_nginx_proc
      changed_when: false
      failed_when: false
      delegate_to: "{{ item }}"
      loop: "{{ groups['cluster_nodes'] }}"

    - name: "T14.4 | Her node'da php-fpm process kontrolü"
      command: pgrep -a php-fpm
      register: t14_phpfpm_proc
      changed_when: false
      failed_when: false
      delegate_to: "{{ item }}"
      loop: "{{ groups['cluster_nodes'] }}"

    - name: "T14.4 | Process durumları"
      debug:
        msg: |
          {{ item.0.item }}:
            nginx   : {{ '✓ PID: ' + item.0.stdout | replace('\n', ', ') if item.0.rc == 0 else '✗ Çalışmıyor' }}
            php-fpm : {{ '✓ PID: ' + item.1.stdout.split('\n')[0] if item.1.rc == 0 else '✗ Çalışmıyor' }}
      loop: "{{ t14_nginx_proc.results | zip(t14_phpfpm_proc.results) | list }}"
      loop_control:
        label: "{{ item.0.item }}"

    # =========================================================================
    # T14.5 — HTTP / PHP ERİŞİM TESTLERİ
    # =========================================================================
    - name: "T14.5 | VIP HTTP erişim testi (index.html)"
      uri:
        url: "http://{{ virtual_ip }}/index.html"
        method: GET
        status_code: 200
        timeout: 15
        return_content: yes
      register: t14_html_test
      failed_when: false
      delegate_to: localhost

    - name: "T14.5 | VIP PHP erişim testi (index.php)"
      uri:
        url: "http://{{ virtual_ip }}/index.php"
        method: GET
        status_code: 200
        timeout: 15
        return_content: yes
      register: t14_php_test
      failed_when: false
      delegate_to: localhost

    - name: "T14.5 | PHP-FPM SAPI doğrulama (içerik kontrolü)"
      assert:
        that: "'fpm-fcgi' in (t14_php_test.content | default(''))"
        success_msg: "✓ PHP-FPM SAPI (fpm-fcgi) aktif"
        fail_msg: "⚠ PHP-FPM SAPI doğrulanamadı (içerik kontrol edilemedi veya sapi farklı)"
      failed_when: false

    - name: "T14.5 | Erişim test sonuçları"
      debug:
        msg: |
          index.html : {{ '✅ HTTP ' + (t14_html_test.status | string) + ' OK' if t14_html_test.status | default(0) == 200 else '❌ HTTP ' + (t14_html_test.status | default('?') | string) }}
          index.php  : {{ '✅ HTTP ' + (t14_php_test.status | string) + ' OK' if t14_php_test.status | default(0) == 200 else '❌ HTTP ' + (t14_php_test.status | default('?') | string) }}

    # =========================================================================
    # T14.6 — NGINX STATUS ENDPOINT
    # =========================================================================
    - name: "T14.6 | nginx_status endpoint testi"
      uri:
        url: "http://{{ virtual_ip }}{{ nginx_status_path | default('/nginx_status') }}"
        method: GET
        timeout: 10
        return_content: yes
      register: t14_status_test
      failed_when: false
      delegate_to: localhost

    - name: "T14.6 | nginx_status sonucu"
      debug:
        msg: |
          nginx_status ({{ virtual_ip }}{{ nginx_status_path | default('/nginx_status') }}):
          {{ '✅ Erişilebilir\n' + t14_status_test.content | default('') if t14_status_test.status | default(0) == 200 else '⚠ Erişilemiyor (HTTP ' + (t14_status_test.status | default('?') | string) + ')' }}

    # =========================================================================
    # T14.7 — GFS2 WEB KÖK YAZMA TESTİ + gfs2_probe KAYNAK KONTROLÜ
    # =========================================================================
    # SORUN: iSCSI kesintisinde GFS2 "withdraw" → /shared/webfs I/O error
    # ÇÖZÜM: gfs2_probe-clone kaynağı gerçek I/O testi yapar (30s interval)
    #         I/O fail → on-fail=fence → node reboot → iSCSI reconnect → temiz açılış
    # =========================================================================

    - name: "T14.7 | GFS2 probe kaynağı durumu"
      command: pcs resource status gfs2_probe-clone
      register: t14_gfs2_probe_status
      changed_when: false
      failed_when: false

    - name: "T14.7 | gfs2_probe-clone durumu"
      debug:
        msg: "{{ t14_gfs2_probe_status.stdout_lines | default(['(kaynak mevcut değil — PLAY 1c çalıştırıldı mı?)']) }}"

    - name: "T14.7 | GFS2 sağlık durumu kontrol (mountpoint)"
      shell: mountpoint -q {{ gfs2_mount }} && echo "mounted" || echo "not_mounted"
      register: t14_gfs2_mountcheck
      changed_when: false
      failed_when: false
      delegate_to: "{{ groups['cluster_nodes'][0] }}"

    - name: "T14.7 | GFS2 I/O ön kontrol (timeout ile)"
      shell: timeout 5 ls {{ gfs2_mount }} > /dev/null 2>&1 && echo "io_ok" || echo "io_error"
      register: t14_gfs2_io_precheck
      changed_when: false
      failed_when: false
      delegate_to: "{{ groups['cluster_nodes'][0] }}"

    - name: "T14.7 | GFS2 mount ve I/O durumu"
      debug:
        msg: |
          GFS2 mount    : {{ t14_gfs2_mountcheck.stdout | default('?') }}
          GFS2 I/O ön   : {{ t14_gfs2_io_precheck.stdout | default('?') }}
          {% if 'io_error' in (t14_gfs2_io_precheck.stdout | default('')) %}
          ⚠ GFS2 I/O hatası tespit edildi!
          Bu iSCSI kesintisi sonrası GFS2 withdraw durumunu gösterir.
          Otomatik recovery: gfs2_probe-clone → on-fail=fence → node reboot
          Manuel: pcs resource disable gfs2_lv_activate-clone && sleep 5 && pcs resource enable gfs2_lv_activate-clone
          {% endif %}

    - name: "T14.7 | GFS2 web kök tmp dizini kontrol (shell - I/O error tolerant)"
      shell: >
        test -d {{ nginx_web_root | default(gfs2_mount + '/html') }}/tmp &&
        echo "exists" || echo "missing"
      register: t14_tmp_dir
      changed_when: false
      failed_when: false
      delegate_to: "{{ groups['cluster_nodes'][0] }}"
      when: t14_gfs2_io_precheck.stdout | default('') | trim == 'io_ok'

    - name: "T14.7 | tmp dizini yoksa oluştur"
      file:
        path: "{{ nginx_web_root | default(gfs2_mount + '/html') }}/tmp"
        state: directory
        owner: nginx
        group: nginx
        mode: '0755'
      when:
        - t14_gfs2_io_precheck.stdout | default('') | trim == 'io_ok'
        - t14_tmp_dir.stdout | default('') | trim == 'missing'
      failed_when: false
      delegate_to: "{{ groups['cluster_nodes'][0] }}"

    - name: "T14.7 | GFS2 yazma testi — node 1'den /html/tmp/ altına"
      shell: >
        echo "T14_test_{{ ansible_date_time.epoch }}_{{ groups['cluster_nodes'][0].split('.')[0] }}"
        > {{ nginx_web_root | default(gfs2_mount + '/html') }}/tmp/.t14_write_test
      register: t14_gfs2_write
      changed_when: false
      failed_when: false
      become_user: nginx
      delegate_to: "{{ groups['cluster_nodes'][0] }}"
      when: t14_gfs2_io_precheck.stdout | default('') | trim == 'io_ok'

    - name: "T14.7 | GFS2 yazma sonucu"
      debug:
        msg: |
          {% if t14_gfs2_io_precheck.stdout | default('') | trim == 'io_error' %}
          ⚠ GFS2 I/O hatası — yazma testi ATLANDI (GFS2 erişilemiyor)
          Otomatik çözüm: gfs2_probe-clone kaynağı tespit eder ve node'u fence eder
          Manuel çözüm:
            pcs resource disable gfs2_lv_activate-clone
            sleep 10
            pcs resource enable gfs2_lv_activate-clone
          {% elif t14_gfs2_write is defined and t14_gfs2_write.rc == 0 %}
          ✓ GFS2 web kök yazma testi başarılı (nginx kullanıcısı, /html/tmp/)
          {% else %}
          ✗ GFS2 yazma hatası! Sahiplik kontrol: chown -R nginx:nginx {{ nginx_web_root | default(gfs2_mount + '/html') }}
          {% endif %}
      failed_when: false

    # =========================================================================
    # T14.8 — GFS2 ÇAPRAZ-NODE OKUMA TESTİ
    # =========================================================================
    - name: "T14.8 | GFS2 çapraz-node okuma — node 2'den oku"
      command: >
        cat {{ nginx_web_root | default(gfs2_mount + '/html') }}/tmp/.t14_write_test
      register: t14_gfs2_cross_read
      changed_when: false
      failed_when: false
      delegate_to: "{{ groups['cluster_nodes'][1] }}"

    - name: "T14.8 | GFS2 çapraz-node sonucu"
      assert:
        that: t14_gfs2_cross_read.rc == 0 and t14_gfs2_cross_read.stdout != ''
        success_msg: "✓ GFS2 çapraz-node erişim OK — node1 yazdı, node2 okudu: {{ t14_gfs2_cross_read.stdout }}"
        fail_msg: "✗ Node2 GFS2 dosyasını okuyamadı — GFS2 mount kontrol edin"
      failed_when: false

    - name: "T14.8 | Temizlik — test dosyası kaldır"
      file:
        path: "{{ nginx_web_root | default(gfs2_mount + '/html') }}/tmp/.t14_write_test"
        state: absent
      failed_when: false

    # =========================================================================
    # T14.9 — PHP-PGSQL POSTGRESQL BAĞLANTI TESTİ
    # =========================================================================
    - name: "T14.9 | PHP üzerinden PostgreSQL bağlantı testi"
      shell: |
        php -r "
        if (function_exists('pg_connect')) {
            \$c = @pg_connect('host={{ virtual_ip }} port={{ pgsql_port }} dbname=postgres user=postgres password={{ pgsql_password }} connect_timeout=3');
            if (\$c) { \$v = pg_version(\$c); echo 'OK:' . \$v[\"server\"]; pg_close(\$c); }
            else { echo 'FAIL:pg_connect hata'; }
        } else { echo 'NOEXT:php-pgsql kurulu degil'; }
        "
      register: t14_pgsql_php_test
      changed_when: false
      failed_when: false
      no_log: true

    - name: "T14.9 | PostgreSQL PHP bağlantı sonucu"
      debug:
        msg: |
          {% if t14_pgsql_php_test.stdout | default('') is search('^OK:') %}
          ✓ PHP → PostgreSQL (VIP): Bağlantı başarılı — {{ t14_pgsql_php_test.stdout | replace('OK:', 'PostgreSQL ') }}
          {% elif t14_pgsql_php_test.stdout | default('') is search('^NOEXT:') %}
          ✗ php-pgsql kurulu değil!
            Düzeltmek için:
              dnf install php-pgsql -y        (her iki node'da)
              pcs resource cleanup php-fpm-clone
          {% else %}
          ⚠ Bağlantı başarısız: {{ t14_pgsql_php_test.stdout | default(t14_pgsql_php_test.stderr | default('bilinmiyor')) }}
            pg_hba.conf veya parola kontrol edin.
          {% endif %}

    # =========================================================================
    # T14.10 — CLEANUP SONRASI YENİDEN BAŞLATMA TESTİ
    # =========================================================================
    - name: "T14.10 | nginx-clone cleanup ve yeniden başlatma testi"
      command: pcs resource cleanup nginx-clone
      changed_when: false
      failed_when: false

    - name: "T14.10 | 25s bekle — nginx-clone stabilize olsun"
      pause:
        seconds: 25

    - name: "T14.10 | Cleanup sonrası HTTP erişim"
      uri:
        url: "http://{{ virtual_ip }}/index.html"
        method: GET
        status_code: 200
        timeout: 15
      register: t14_after_cleanup
      failed_when: false
      delegate_to: localhost

    - name: "T14.10 | Cleanup sonrası nginx-clone durumu"
      command: pcs resource status nginx-clone
      register: t14_post_cleanup_status
      changed_when: false
      failed_when: false

    - name: "T14.10 | Cleanup sonrası sonuçlar"
      debug:
        msg: |
          HTTP erişim sonrası: {{ '✅ HTTP 200 OK' if t14_after_cleanup.status | default(0) == 200 else '❌ ' + (t14_after_cleanup.status | default('?') | string) }}
          nginx-clone durumu: {{ t14_post_cleanup_status.stdout_lines | default(['(boş)']) }}

    # =========================================================================
    # T14.11 — HATA ANALİZİ (Başarısız kaynak varsa)
    # =========================================================================
    - name: "T14.11 | Başarısız resource action kontrolü"
      shell: pcs status | grep -A 5 'Failed Resource Actions' || echo "NO_FAILURES"
      register: t14_failed_actions
      changed_when: false
      failed_when: false

    - name: "T14.11 | Hata analizi ve öneriler"
      debug:
        msg: |
          {% if 'NO_FAILURES' in t14_failed_actions.stdout %}
          ✓ Başarısız resource action yok
          {% else %}
          ⚠ Başarısız resource action'lar:
          {{ t14_failed_actions.stdout }}

          Bilinen Sorunlar ve Çözümler:
          ───────────────────────────────────────────────
          1. nginx 'not installed':
             → pcs resource update nginx httpd=/usr/sbin/nginx
             → pcs resource cleanup nginx-clone

          2. php-fpm 'Unable to invoke systemd DBus method':
             → systemctl unmask php-fpm  (her iki node'da)
             → pcs resource cleanup php-fpm-clone

          3. GFS2 yazma hatası (index.php):
             → chown -R nginx:nginx {{ nginx_web_root | default(gfs2_mount + '/html') }}
             → mkdir -p {{ nginx_web_root | default(gfs2_mount + '/html') }}/tmp

          4. pg_connect fonksiyonu yok:
             → dnf install php-pgsql -y  (her iki node'da)
             → pcs resource cleanup php-fpm-clone

          5. Eksik constraint'ler:
             → pcs constraint order start gfs2_fs-clone then php-fpm-clone id=order-gfs2fs-phpfpm
             → pcs constraint order start postgresql then php-fpm-clone id=order-postgresql-phpfpm
             → pcs constraint order start php-fpm-clone then nginx-clone id=order-phpfpm-nginx
          {% endif %}

    # =========================================================================
    # T14 — GENEL SONUÇ
    # =========================================================================
    - name: "T14 | ASSERT — HTML erişimi başarılı olmalı"
      assert:
        that: t14_html_test.status | default(0) == 200
