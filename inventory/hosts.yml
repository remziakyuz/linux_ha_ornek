---
# =============================================================================
# RED HAT 9 HA CLUSTER - ANA KONFİGÜRASYON DOSYASI
# =============================================================================
# TÜM ayarları buradan yapın. Playbook'ta HİÇBİR şey değiştirmeyin.
# =============================================================================

all:
  children:

    # =========================================================================
    # CLUSTER NODE'LARI (Aktif küme üyeleri)
    # =========================================================================
    cluster_nodes:
      hosts:
        clstr01.lab.akyuz.tech:
          ansible_host: 192.168.0.61         # Public IP
          ansible_user: root
          ansible_ssh_private_key_file: ~/.ssh/id_rsa
          cluster_ip: 172.16.16.61              # Cluster (Corosync) IP
          # ---- IPMI / iDRAC / iLO (Out-of-Band Yönetim) ----
          ipmi_ip: 192.168.1.248                 # IPMI/iDRAC/iLO IP adresi
          ipmi_port: 6330                        # IPMI port (default: 623, Dell iDRAC: 623, HP iLO: 623)
          ipmi_user: "admin"                    # IPMI kullanıcı adı
          ipmi_password: "password"         # IPMI şifresi - DEĞİŞTİRİN!
          ipmi_lanplus: true                    # IPMI v2 / iDRAC / iLO için true

        clstr02.lab.akyuz.tech:
          ansible_host: 192.168.0.62          # Public IP
          ansible_user: root
          ansible_ssh_private_key_file: ~/.ssh/id_rsa
          cluster_ip: 172.16.16.62              # Cluster (Corosync) IP
          # ---- IPMI / iDRAC / iLO (Out-of-Band Yönetim) ----
          ipmi_ip: 192.168.1.248                 # IPMI/iDRAC/iLO IP adresi
          ipmi_port: 6331                        # IPMI port (default: 623, Dell iDRAC: 623, HP iLO: 623)
          ipmi_user: "admin"                    # IPMI kullanıcı adı
          ipmi_password: "password"         # IPMI şifresi - DEĞİŞTİRİN!
          ipmi_lanplus: true                    # IPMI v2 / iDRAC / iLO için true

    # =========================================================================
    # QUORUM DEVICE (Quorum arbitratörü - küme üyesi DEĞİL)
    # =========================================================================
    quorum_device:
      hosts:
        clstr-qrm01.lab.akyuz.tech:
          ansible_host: 192.168.0.67          # Public IP
          ansible_user: root
          ansible_ssh_private_key_file: ~/.ssh/id_rsa
          cluster_ip: 172.16.16.67              # Management IP

  # ===========================================================================
  # GLOBAL DEĞİŞKENLER - Sadece bu bölümü düzenleyin
  # ===========================================================================
  vars:

    # ---- ANSIBLE SSH -------------------------------------------------------
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o ConnectTimeout=10'

    # ---- CLUSTER TEMEL AYARLAR ---------------------------------------------
    cluster_name: "ha_webpgsql"
    cluster_password: "Clusterss2024"      # !! MUTLAKA DEĞİŞTİRİN !!
    cluster_domain: "lab.akyuz.tech"

    # ---- AĞ AYARLARI -------------------------------------------------------
    # Network interface adları (ip -br a s ile tespit edildi):
    #   enp1s0 → 192.168.0.x/23  (public / VIP ağı)
    #   enp2s0 → 172.16.16.x/24  (corosync cluster ağı)
    public_nic: "enp1s0"     # VIP ve public erişim interface'i
    cluster_nic: "enp2s0"    # Corosync ring interface'i

    virtual_ip: "192.168.0.63"               # Cluster Virtual IP (VIP)
    virtual_ip_cidr: "23"                     # Subnet mask (192.168.0.0/23)
    public_network: "192.168.0.0/23"          # Public ağ adresi

    # =========================================================================
    # DEPOLAMA: iSCSI VE MULTIPATH - İSTEĞE BAĞLI YAPILANDIRMA
    # =========================================================================
    #
    # configure_iscsi: true  → iSCSI initiator kurulur, target keşfedilir,
    #                          login yapılır ve oturum kalıcı hale getirilir.
    # configure_iscsi: false → iSCSI tamamen atlanır. Diskler önceden bağlı
    #                          olmalı (FC, doğrudan iSCSI pre-config, vb.)
    #
    # configure_multipath: true  → /etc/multipath.conf yeniden yazılır,
    #                               wwid → alias eşlemesi yapılır, multipathd
    #                               yeniden başlatılır.
    # configure_multipath: false → Mevcut multipath yapılandırması korunur.
    #                               Sadece disk yollarının var olduğu doğrulanır.
    #
    # Komut satırından geçici override:
    #   ansible-playbook ha_cluster_setup.yml -e configure_iscsi=false
    #   ansible-playbook ha_cluster_setup.yml -e configure_multipath=false
    #   ansible-playbook ha_cluster_setup.yml -e configure_iscsi=false -e configure_multipath=false
    # =========================================================================
    configure_iscsi: true                     # true: iSCSI kur | false: mevcut yapıyı kullan
    configure_multipath: true                 # true: multipath kur | false: mevcut yapıyı kullan

    # ---- iSCSI AYARLARI (configure_iscsi: true ise kullanılır) --------------
    iscsi_target_ip: "172.16.16.248"          # iSCSI target sunucu IP'si
    iscsi_iqn: "iqn.2025-01.com.sirket:storage01"  # iSCSI IQN (target'tan alın)
    iscsi_initiator_base: "iqn.1994-05.lab.local"

    # ---- STORAGE: GFS2 (Web) Diski ----------------------------------------
    # İlk iSCSI disk → GFS2 (aktif/aktif web paylaşımı için)
    # !! DİSK ADINI DOĞRULAYIN: iscsiadm -m session -P 3 | grep "Attached scsi disk"
    # !! OS diski ASLA yazılmamalı (genellikle vda veya sda ilk disk)
    shared_disk: "/dev/mapper/pv_ha_shared01"
    shared_vg: "shared_vg"                    # GFS2 Volume Group (--shared, dlm+lvmlockd)
    gfs2_lv: "gfs2_lv"                        # GFS2 Logical Volume
    gfs2_lv_size: "50G"                       # GFS2 boyutu (/shared/webfs)

    # ---- STORAGE: PostgreSQL Diski -----------------------------------------
    # İkinci iSCSI disk → PostgreSQL (aktif/pasif, exclusive access)
    db_disk: "/dev/mapper/pv_ha_shared02"
    db_vg: "db_vg"                            # PostgreSQL Volume Group (exclusive)
    pgsql_lv: "pgsql_lv"                      # PostgreSQL Logical Volume
    pgsql_lv_size: "40G"                      # PostgreSQL boyutu (/var/lib/pgsql)

    # ---- MULTIPATH WWID TANIMLARI (configure_multipath: true ise kullanılır) -
    # Her iSCSI disk için WWID → /dev/mapper alias eşlemesi
    # WWID tespiti: multipath -ll | grep -E '^\S.*\(' komutuyla bulunur
    # !! WWID'leri storage ortamınıza göre güncelleyin !!
    multipath_aliases:
      - alias: "pv_ha_shared01"               # shared_disk basename → /dev/mapper/pv_ha_shared01
        wwid: "360014050b56232984714db8a4bdd0ea9"   # GFS2 disk WWID (100G)
      - alias: "pv_ha_shared02"               # db_disk basename → /dev/mapper/pv_ha_shared02
        wwid: "360014056d2949ca6a2b455d82d2c6b37"   # PostgreSQL disk WWID (200G)

    # ---- MOUNT NOKTALARI ---------------------------------------------------
    gfs2_mount: "/shared/webfs"               # GFS2 mount noktası (aktif/aktif)
    pgsql_mount: "/var/lib/pgsql"             # PostgreSQL mount noktası (aktif/pasif)

    # ---- GFS2 AYARLARI -----------------------------------------------------
    gfs2_journals: 2                          # Cluster node sayısına eşit olmalı
    gfs2_lock_table: "webfs"                  # GFS2 lock table adı

    # ---- POSTGRESQL AYARLARI -----------------------------------------------
    pgsql_version: "18"                       # PostgreSQL major version
    pgsql_port: 5432                          # PostgreSQL port
    pgsql_data_dir: "/var/lib/pgsql/data"     # PostgreSQL data dizini
    pgsql_allowed_networks:
      - "192.168.0.0/23"                      # Public ağdan erişim
      - "10.10.10.0/24"                       # Cluster ağından erişim
      - "127.0.0.1/32"                        # Localhost
    pgsql_password: "password"                # !! MUTLAKA DEĞİŞTİRİN !!
                                              # postgres kullanıcısı parolası

    # ---- QUORUM DEVICE AYARLARI -------------------------------------------
    qdevice_port: 5403                        # corosync-qnetd port
    qdevice_algorithm: "ffsplit"              # 2 node için ffsplit önerilir

    # ---- STONITH AYARLARI (IPMI / iDRAC / iLO) ---------------------------
    stonith_enabled: true
    stonith_action: "reboot"                  # reboot (önerilen) | off | on

    # ---- CLUSTER RESOURCE TİMEOUT'LARI -----------------------------------
    resource_start_timeout: "60s"
    resource_stop_timeout: "60s"
    resource_monitor_interval: "30s"
    no_quorum_policy: "freeze"               # 2-node için "ignore" veya "freeze"
    resource_stickiness: "100"
    migration_threshold: "3"

    # =========================================================================
    # WEB SERVİSİ - NGINX + PHP-FPM AYARLARI
    # =========================================================================
    # Mimari:
    #   - Nginx HER İKİ node'da çalışır (aktif/aktif clone resource)
    #   - Web kök: {{ gfs2_mount }}/html → /shared/webfs/html (GFS2 üzerinde)
    #   - PHP-FPM HER İKİ node'da çalışır (clone resource)
    #   - Cluster kaynak sırası: gfs2_fs-clone → php-fpm-clone → nginx-clone
    #   - Test sayfaları: index.html ve index.php (her iki node'dan erişilebilir)
    #   - VIP üzerinden: http://{{ virtual_ip }}/
    # =========================================================================
    nginx_port: 80                            # HTTP port
    nginx_https_port: 443                     # HTTPS port (opsiyonel, şimdilik kullanılmıyor)
    nginx_status_path: "/nginx_status"        # Cluster monitoring stub_status URL
    nginx_web_root: "{{ gfs2_mount }}/html"   # Web kök dizini (GFS2 üzerinde)
    nginx_config_file: "/etc/nginx/nginx.conf"

    # PHP-FPM socket (nginx ile iletişim)
    php_fpm_socket: "/run/php-fpm/www.sock"
    php_fpm_pool_user: "nginx"               # php-fpm pool kullanıcısı (nginx ile uyumlu)
    php_fpm_pool_group: "nginx"              # php-fpm pool grubu

    # ---- FIREWALL PORT'LARI -----------------------------------------------
    ha_firewall_ports:
      - "2224/tcp"                            # pcsd
      - "3121/tcp"                            # pacemaker
      - "5405/udp"                            # corosync
      - "5406/udp"                            # corosync
      - "21064/tcp"                           # dlm
      - "9929/tcp"                            # corosync-qnetd
      - "9929/udp"                            # corosync-qnetd
      - "5432/tcp"                            # PostgreSQL
      - "80/tcp"                              # Nginx HTTP (web servisi)
      - "443/tcp"                             # Nginx HTTPS (opsiyonel)
